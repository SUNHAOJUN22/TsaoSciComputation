name: Finalize v3.0.2 scientific confidence r2

on:
  push:
    branches: [main]
    paths: [.finalize-v302-confidence]

permissions:
  contents: write
  actions: write

concurrency:
  group: finalize-v302-confidence-main
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip

      - name: Materialize and verify Python 3.13 release gates
        shell: bash
        run: |
          set -Eeuo pipefail
          : > /tmp/v302-confidence.log
          exec > >(tee -a /tmp/v302-confidence.log) 2>&1
          echo initialization > /tmp/v302-confidence-stage
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git show de1c901ab6cd02fba5811547f7e5f9c9063b30cd:.github/workflows/ci.yml > /tmp/production-ci.yml
          python -m pip install -e '.[validation,quality]'

          echo apply-governance > /tmp/v302-confidence-stage
          python scripts/_apply_v302_governance.py apply
          python scripts/_apply_adapter_certification.py
          python scripts/_finalize_scientific_governance.py apply
          python scripts/_apply_confidence_model.py
          sed -i '/^[[:space:]]*init_path = ROOT \/ "tsao_computation" \/ "validation" \/ "__init__.py"$/d' scripts/_apply_confidence_model.py

          python - <<'PY'
          from pathlib import Path

          sbom = Path('scripts/build_sbom.py')
          text = sbom.read_text(encoding='utf-8')
          old = '''try:
              import tomllib
          except ModuleNotFoundError:  # pragma: no cover - Python 3.10 compatibility
              import tomli as tomllib  # type: ignore[import-not-found,no-redef]
          '''
          new = '''import sys

          if sys.version_info >= (3, 11):
              import tomllib
          else:  # pragma: no cover - exercised only on Python 3.10
              import tomli as tomllib
          '''
          if old in text:
              sbom.write_text(text.replace(old, new, 1), encoding='utf-8')

          governance = Path('scripts/_apply_v302_governance.py')
          text = governance.read_text(encoding='utf-8')
          old = '''    dependency = json.loads((ROOT / "reports/DEPENDENCY_AUDIT.json").read_text(encoding="utf-8"))
              vulnerable = [item for item in dependency.get("dependencies", []) if item.get("vulns")]
          '''
          new = '''    dependency_payload = json.loads(
                  (ROOT / "reports/DEPENDENCY_AUDIT.json").read_text(encoding="utf-8")
              )
              dependencies = (
                  dependency_payload
                  if isinstance(dependency_payload, list)
                  else dependency_payload.get("dependencies", [])
              )
              vulnerable = [item for item in dependencies if item.get("vulns")]
          '''
          if old in text:
              governance.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

          echo clean-temporary-entrypoints > /tmp/v302-confidence-stage
          cp /tmp/production-ci.yml .github/workflows/ci.yml
          rm -f .github/workflows/finalize-v302-confidence.yml .finalize-v302-confidence
          rm -f .github/workflows/deepen-maintenance.yml .deepen-maintenance
          rm -f reports/MAINTENANCE_GOVERNANCE_FAILURE.json reports/SCIENTIFIC_GOVERNANCE_FAILURE.json

          echo sync-version > /tmp/v302-confidence-stage
          python scripts/sync_version_metadata.py --release-date 2026-07-24
          echo reinstall-v302 > /tmp/v302-confidence-stage
          python -m pip install -e '.[validation,quality,security]'
          echo ruff-lint-fix > /tmp/v302-confidence-stage
          python -m ruff check --fix tsao_computation scripts tests _bootstrap.py
          echo ruff-format > /tmp/v302-confidence-stage
          python -m ruff format tsao_computation scripts tests _bootstrap.py
          echo sync-assets > /tmp/v302-confidence-stage
          python scripts/sync_package_assets.py
          echo adapter-docs > /tmp/v302-confidence-stage
          python scripts/build_adapter_docs.py
          echo workflow-docs > /tmp/v302-confidence-stage
          python scripts/build_workflow_docs.py
          echo examples > /tmp/v302-confidence-stage
          python scripts/build_examples.py
          echo scientific-benchmarks > /tmp/v302-confidence-stage
          python scripts/run_scientific_benchmarks.py
          echo preliminary-manifest > /tmp/v302-confidence-stage
          python scripts/build_manifest.py

          echo python-3.13-release > /tmp/v302-confidence-stage
          python scripts/verify_all.py --profile all
          python scripts/verify_all.py --profile benchmark

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'
          cache: pip

      - name: Verify Python 3.10 core gates
        shell: bash
        run: |
          set -Eeuo pipefail
          exec > >(tee -a /tmp/v302-confidence.log) 2>&1
          echo python-3.10-core > /tmp/v302-confidence-stage
          python -m pip install -e '.[validation,quality]'
          python scripts/verify_all.py --profile core

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip

      - name: Refresh final evidence and publish main
        shell: bash
        run: |
          set -Eeuo pipefail
          exec > >(tee -a /tmp/v302-confidence.log) 2>&1
          echo final-python-3.13-evidence > /tmp/v302-confidence-stage
          python -m pip install -e '.[validation,quality,security]'
          python scripts/run_tests.py --coverage
          python -m coverage json -o /tmp/maintenance-coverage.json
          cp /tmp/maintenance-coverage.json /tmp/scientific-coverage.json
          cp /tmp/maintenance-coverage.json evidence/coverage.json
          python scripts/run_scientific_benchmarks.py

          mkdir -p reports
          python -m pip freeze --all > reports/DEPENDENCY_SNAPSHOT.txt
          timeout 300 python -m pip_audit --local --skip-editable --progress-spinner=off --format=json --output reports/DEPENDENCY_AUDIT.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('reports/DEPENDENCY_AUDIT.json').read_text(encoding='utf-8'))
          dependencies = payload if isinstance(payload, list) else payload.get('dependencies', [])
          vulnerable = [item for item in dependencies if item.get('vulns')]
          if vulnerable:
              raise SystemExit(f'known dependency vulnerabilities remain: {vulnerable}')
          PY

          echo install-and-single-main > /tmp/v302-confidence-stage
          rm -rf /tmp/TsaoSciComputation
          python scripts/install_skill.py --agent codex --scope project --target /tmp/TsaoSciComputation --force
          python scripts/install_skill.py --agent codex --scope project --target /tmp/TsaoSciComputation --validate
          python scripts/install_skill.py --agent codex --scope project --target /tmp/TsaoSciComputation --uninstall
          mapfile -t branches < <(gh api --paginate "repos/$GITHUB_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u)
          test "${#branches[@]}" -eq 1
          test "${branches[0]}" = main

          echo finalize-evidence > /tmp/v302-confidence-stage
          python scripts/_apply_v302_governance.py finalize
          python scripts/_finalize_scientific_governance.py finalize
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          final_path = Path('reports/FINAL_VERIFICATION.json')
          final = json.loads(final_path.read_text(encoding='utf-8'))
          final.update({
              'version': '3.0.2',
              'status': 'VALIDATED',
              'scientific_confidence_model': 'C0-C5_FAIL_CLOSED',
              'confidence_schema_validated': True,
              'engineering_decision_level': 'C5_EXPLICIT_ONLY',
              'verified_at_utc': datetime.now(timezone.utc).isoformat(),
              'remote_branches': ['main'],
              'temporary_branch_created': False,
          })
          final_path.write_text(json.dumps(final, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          baseline_path = Path('evidence/quality-baseline.json')
          baseline = json.loads(baseline_path.read_text(encoding='utf-8'))
          baseline['scientific_confidence'] = {
              'scheme': 'C0-C5',
              'policy': 'fail-closed-sequential',
              'schema': 'schemas/confidence-assessment.schema.json',
              'engineering_decision_ready_only_at': 'C5',
          }
          baseline_path.write_text(json.dumps(baseline, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY

          rm -f scripts/_apply_v302_governance.py
          rm -f scripts/_apply_adapter_certification.py
          rm -f scripts/_finalize_scientific_governance.py
          rm -f scripts/_apply_confidence_model.py
          rm -f reports/MAINTENANCE_GOVERNANCE_FAILURE.json reports/SCIENTIFIC_GOVERNANCE_FAILURE.json
          rm -f reports/V302_CONFIDENCE_FINALIZATION_FAILURE.json

          echo final-validation > /tmp/v302-confidence-stage
          python scripts/run_scientific_benchmarks.py
          python scripts/build_adapter_docs.py
          python scripts/build_manifest.py
          python scripts/sync_version_metadata.py --check
          python scripts/validate_repository.py
          python scripts/validate_schemas.py
          python scripts/validate_adapter_metadata.py
          python scripts/check_critical_coverage.py
          python scripts/build_manifest.py --check
          python -m pytest -q

          echo publish > /tmp/v302-confidence-stage
          git add -A
          git commit -m 'Deepen scientific confidence and maintenance governance for v3.0.2'
          git push origin HEAD:refs/heads/main
          gh workflow run release.yml --ref main -f tag=v3.0.2

      - name: Record exact finalization failure
        if: ${{ failure() }}
        shell: bash
        run: |
          set +e
          export FAILED_STAGE="$(cat /tmp/v302-confidence-stage 2>/dev/null || echo unknown)"
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          log = Path('/tmp/v302-confidence.log')
          tail = log.read_text(encoding='utf-8', errors='replace').splitlines()[-80:] if log.exists() else []
          payload = {
              'schema_version': '1.0',
              'status': 'FAILED',
              'stage': os.environ['FAILED_STAGE'],
              'branch': 'main',
              'temporary_branch_created': False,
              'failed_at_utc': datetime.now(timezone.utc).isoformat(),
              'log_tail_lines': tail,
          }
          path = Path('reports/V302_CONFIDENCE_FINALIZATION_FAILURE.json')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
          git add reports/V302_CONFIDENCE_FINALIZATION_FAILURE.json
          git commit -m "Record v3.0.2 confidence finalization failure at $FAILED_STAGE" || true
          git push origin HEAD:refs/heads/main || true
