name: Complete v3.0.1 finalization

on:
  push:
    branches: [main]
    paths: [.finalize-v301-r4]

permissions:
  contents: write
  actions: write

concurrency:
  group: finalize-v301-main
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Configure repository
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip

      - name: Verify Python 3.13, supply chain, and governance
        shell: bash
        run: |
          set -Eeuo pipefail
          STAGE=initialization
          exec > >(tee /tmp/v301-r4.log) 2>&1
          record_failure() {
            code=$?
            set +e
            export STAGE code
            python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          log = Path('/tmp/v301-r4.log')
          tail = '\n'.join(log.read_text(encoding='utf-8', errors='replace').splitlines()[-240:]) if log.exists() else ''
          payload = {
              'schema_version': '1.0',
              'status': 'FAILED',
              'stage': os.environ['STAGE'],
              'exit_code': int(os.environ['code']),
              'branch': 'main',
              'temporary_branch_created': False,
              'failed_at_utc': datetime.now(timezone.utc).isoformat(),
              'log_tail': tail,
          }
          path = Path('reports/V301_FINALIZATION_FAILURE.json')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
            git add reports/V301_FINALIZATION_FAILURE.json
            git commit -m "Record v3.0.1 finalization failure at ${STAGE}" || true
            git push origin HEAD:refs/heads/main || true
            exit "$code"
          }
          trap record_failure ERR

          STAGE=dependencies
          python -m pip install -e '.[validation,quality]'
          STAGE=metadata
          python scripts/sync_version_metadata.py --release-date 2026-07-24
          STAGE=format
          python -m ruff check --fix tsao_computation scripts tests _bootstrap.py
          python -m ruff format tsao_computation scripts tests _bootstrap.py
          STAGE=generated-assets
          python scripts/sync_package_assets.py
          python scripts/build_adapter_docs.py
          python scripts/build_workflow_docs.py
          python scripts/build_examples.py
          STAGE=clean-temporary-files
          rm -f .github/workflows/finalize-v301.yml .github/workflows/finalize-v301-r4.yml
          rm -f .finalize-v301 .finalize-v301-r4 reports/V301_FINALIZATION_FAILURE.json
          python scripts/build_manifest.py
          STAGE=python-3.13-all
          python scripts/verify_all.py --profile all
          STAGE=benchmark
          python scripts/verify_all.py --profile benchmark
          python scripts/build_manifest.py
          STAGE=skill-roundtrip
          rm -rf /tmp/TsaoSciComputation
          python scripts/install_skill.py --agent codex --scope project --target /tmp/TsaoSciComputation --force
          python scripts/install_skill.py --agent codex --scope project --target /tmp/TsaoSciComputation --validate
          python scripts/install_skill.py --agent codex --scope project --target /tmp/TsaoSciComputation --uninstall
          STAGE=single-main-policy
          mapfile -t branches < <(gh api --paginate "repos/$GITHUB_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u)
          test "${#branches[@]}" -eq 1
          test "${branches[0]}" = main
          STAGE=platform-security-setting
          pvr_enabled="$(gh api "repos/$GITHUB_REPOSITORY/private-vulnerability-reporting" --jq '.enabled')"
          enable_attempt=not-needed
          if [ "$pvr_enabled" != true ]; then
            enable_attempt=permission-denied
            if gh api --method PUT "repos/$GITHUB_REPOSITORY/private-vulnerability-reporting" >/tmp/pvr-enable.log 2>&1; then
              enable_attempt=enabled
            fi
            pvr_enabled="$(gh api "repos/$GITHUB_REPOSITORY/private-vulnerability-reporting" --jq '.enabled')"
          fi
          export PVR_ENABLED="$pvr_enabled" PVR_ENABLE_ATTEMPT="$enable_attempt"

          STAGE=refresh-evidence
          python -m coverage json -o /tmp/v301-coverage.json
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path('.')
          version = (root / 'VERSION').read_text(encoding='utf-8').strip()
          collection = subprocess.run([sys.executable, '-m', 'pytest', '--collect-only', '-q'], check=True, capture_output=True, text=True)
          match = re.search(r'(\d+) tests? collected', collection.stdout + collection.stderr)
          if match is None:
              raise SystemExit('unable to determine test count')
          tests = int(match.group(1))
          coverage = json.loads(Path('/tmp/v301-coverage.json').read_text(encoding='utf-8'))['totals']
          statement = 100.0 * (coverage['num_statements'] - coverage['missing_lines']) / coverage['num_statements']
          branch = 100.0 * (coverage['num_branches'] - coverage['missing_branches']) / coverage['num_branches']
          security = json.loads((root / 'evidence/security-scan.json').read_text(encoding='utf-8'))
          mutation = json.loads((root / 'evidence/mutation-report.json').read_text(encoding='utf-8'))
          if security['findings'] or mutation['killed'] != 64 or mutation['survived'] != 0:
              raise SystemExit('security or mutation evidence is not clean')
          pvr = os.environ['PVR_ENABLED'] == 'true'
          platform_gap = [] if pvr else ['private_vulnerability_reporting_requires_repository_admin_enablement']

          baseline_path = root / 'evidence/quality-baseline.json'
          baseline = json.loads(baseline_path.read_text(encoding='utf-8'))
          baseline['version'] = version
          baseline['counts'].update({'tests_passed': tests, 'tests_failed': 0, 'controlled_mutants_killed': 64, 'controlled_mutants_survived': 0})
          baseline['coverage'] = {'branches_percent': branch, 'missing_branches': coverage['missing_branches'], 'missing_statements': coverage['missing_lines'], 'statements_percent': statement}
          baseline['security']['repository_findings'] = 0
          baseline['packaging'].update({'spdx_sbom': True, 'cyclonedx_sbom': True, 'release_manifest': True, 'sha256_checksums': True, 'github_sigstore_attestations_required_at_release': True})
          baseline_path.write_text(json.dumps(baseline, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          platform = {'schema_version': '1.0', 'repository': 'SUNHAOJUN22/TsaoSciComputation', 'private_vulnerability_reporting_enabled': pvr, 'enable_attempt': os.environ['PVR_ENABLE_ATTEMPT'], 'fallback_security_policy_documented': True, 'remaining_admin_actions': platform_gap}
          (root / 'reports/PLATFORM_SETTINGS.json').write_text(json.dumps(platform, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          remote_path = root / 'reports/REMOTE_FINALIZATION.json'
          remote = json.loads(remote_path.read_text(encoding='utf-8'))
          remote['version'] = version
          remote['tests'] = {'errors': 0, 'failures': 0, 'passed': tests}
          remote['coverage'].update({'missing_branches': coverage['missing_branches'], 'missing_lines': coverage['missing_lines'], 'num_branches': coverage['num_branches'], 'num_statements': coverage['num_statements'], 'percent_branches_covered': branch, 'percent_statements_covered': statement})
          remote['hardening'].update({'status': 'VALIDATED', 'python_310_core_gates': 'PENDING_NEXT_JOB', 'python_313_release_gates': 'VALIDATED', 'full_manifest_install_roundtrip': 'VALIDATED', 'remote_branches': ['main'], 'temporary_branch_created': False, 'private_vulnerability_reporting': 'ENABLED' if pvr else 'DOCUMENTED_FALLBACK_REQUIRES_ADMIN', 'spdx_sbom': 'VALIDATED', 'cyclonedx_sbom': 'VALIDATED', 'release_manifest': 'VALIDATED', 'sigstore_release_attestation': 'REQUIRED_BY_RELEASE_WORKFLOW'})
          remote_path.write_text(json.dumps(remote, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          report = {'schema_version': '1.0', 'status': 'VALIDATED_PENDING_PYTHON_310', 'verified_at_utc': datetime.now(timezone.utc).isoformat(), 'version': version, 'branch': 'main', 'remote_branches': ['main'], 'temporary_branch_created': False, 'python_313_all': 'PASS', 'python_310_core': 'PENDING', 'benchmark': 'PASS', 'tests_passed': tests, 'tests_failed': 0, 'statement_coverage_percent': statement, 'branch_coverage_percent': branch, 'controlled_mutants': '64/64', 'security_findings': 0, 'private_vulnerability_reporting': pvr, 'platform_settings_gaps': platform_gap, 'source_archives_reproducible': True, 'wheel_reproducible_and_isolated_install': True, 'skill_install_validate_uninstall': True, 'spdx_sbom': True, 'cyclonedx_sbom': True, 'release_manifest_and_checksums': True, 'sigstore_release_attestation_required': True}
          (root / 'reports/FINAL_VERIFICATION.json').write_text(json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          updates = (
              ('README.md', r'\| Tests \| \d+ passed, \d+ failed \|', r'\| Statement / branch coverage \| [^|]+ \|', f'| Tests | {tests} passed, 0 failed |', f'| Statement / branch coverage | {statement:.2f}% / {branch:.2f}% |'),
              ('README.zh-CN.md', r'\| 自动测试 \| \d+ 通过，\d+ 失败 \|', r'\| 语句 / 分支覆盖率 \| [^|]+ \|', f'| 自动测试 | {tests} 通过，0 失败 |', f'| 语句 / 分支覆盖率 | {statement:.2f}% / {branch:.2f}% |'),
          )
          for filename, test_pattern, coverage_pattern, test_text, coverage_text in updates:
              path = root / filename
              text = path.read_text(encoding='utf-8')
              text = re.sub(test_pattern, test_text, text)
              text = re.sub(coverage_pattern, coverage_text, text)
              path.write_text(text, encoding='utf-8')
          PY
          STAGE=final-python-3.13-validation
          python scripts/build_manifest.py
          python scripts/sync_version_metadata.py --check
          python scripts/validate_repository.py
          python scripts/validate_schemas.py
          python scripts/build_manifest.py --check
          python -m pytest -q
          trap - ERR

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'
          cache: pip

      - name: Verify Python 3.10, publish main, and dispatch release
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pip install -e '.[validation,quality]'
          python scripts/verify_all.py --profile core
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          final_path = Path('reports/FINAL_VERIFICATION.json')
          final = json.loads(final_path.read_text(encoding='utf-8'))
          final['status'] = 'VALIDATED'
          final['python_310_core'] = 'PASS'
          final['verified_at_utc'] = datetime.now(timezone.utc).isoformat()
          final_path.write_text(json.dumps(final, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          remote_path = Path('reports/REMOTE_FINALIZATION.json')
          remote = json.loads(remote_path.read_text(encoding='utf-8'))
          remote['hardening']['python_310_core_gates'] = 'VALIDATED'
          remote_path.write_text(json.dumps(remote, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
          python scripts/build_manifest.py
          python scripts/build_manifest.py --check
          git add -A
          git commit -m 'Finalize v3.0.1 governance and release evidence'
          git push origin HEAD:refs/heads/main
          if ! gh workflow run release.yml --ref main -f tag=v3.0.1; then
            cat > reports/RELEASE_DISPATCH_FAILURE.json <<'EOF'
          {"schema_version":"1.0","status":"FAILED","stage":"release-dispatch","tag":"v3.0.1","branch":"main","temporary_branch_created":false}
          EOF
            git add reports/RELEASE_DISPATCH_FAILURE.json
            git commit -m 'Record v3.0.1 release dispatch failure'
            git push origin HEAD:refs/heads/main
            exit 1
          fi
