name: Final CI execution probe

on:
  push:
    branches: [main]
    paths: [.final-ci-audit-trigger]

permissions:
  contents: write

concurrency:
  group: final-dual-version-repository-audit
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - name: Record execution channel
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          printf '{\n  "outcome": "started",\n  "schema_version": "1.0",\n  "workflow": "registered-ci"\n}\n' > .final-ci-status.json
          git add .final-ci-status.json
          git commit -m 'Record registered CI execution channel'
          git push origin HEAD:refs/heads/main
