name: Requirements documentation generation

on:
  push:
    branches: [main]
    paths: [.requirements-generation-trigger]

permissions:
  contents: write

concurrency:
  group: requirements-documentation-generation
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip
      - name: Generate, format, and test requirement artifacts
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          STAGE=install
          report_failure() {
            printf '{"outcome":"failure","schema_version":"1.0","stage":"%s"}\n' "$STAGE" > .requirements-generation-status.json
            git add .requirements-generation-status.json
            git commit -m "Record requirements generation failure at $STAGE" || true
            git push origin HEAD:refs/heads/main || true
          }
          trap report_failure ERR

          python -m pip install -e '.[validation,quality]'
          STAGE=format
          python -m ruff format tsao_computation scripts tests
          STAGE=generate-adapters
          python scripts/build_adapter_docs.py
          STAGE=generate-workflows
          python scripts/build_workflow_docs.py
          STAGE=test-contract
          python -m pytest -q tests/test_contract_completeness.py
          STAGE=test-installer
          python -m pytest -q tests/test_install_skill.py
          STAGE=test-documentation
          python -m pytest -q tests/test_documentation_completeness.py
          STAGE=test-python-compatibility
          python -m pytest -q tests/test_python_compatibility.py
          STAGE=quality-rules
          python scripts/quality_check.py
          STAGE=ruff-lint
          python -m ruff check tsao_computation scripts tests
          STAGE=ruff-format
          python -m ruff format --check tsao_computation scripts tests
          STAGE=mypy-contract
          python -m mypy --python-version 3.13 tsao_computation/contracts/calculation.py tsao_computation/cli.py
          STAGE=mypy-installer
          python -m mypy --python-version 3.13 scripts/install_skill.py
          STAGE=mypy-doc-builders
          python -m mypy --python-version 3.13 scripts/build_adapter_docs.py scripts/build_workflow_docs.py
          STAGE=mypy-all
          python -m mypy --python-version 3.13 tsao_computation scripts
          STAGE=bandit
          python -m bandit -q -r tsao_computation scripts

          rm -f .requirements-generation-status.json
          git add \
            SKILL.md README.md README.zh-CN.md \
            docs schemas templates adapters skills \
            tsao_computation scripts tests
          if ! git diff --cached --quiet; then
            git commit -m 'Generate complete workflow and adapter documentation'
            git push origin HEAD:refs/heads/main
          fi
