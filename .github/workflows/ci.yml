name: Python 3.10 requirements release gates

on:
  push:
    branches: [main]
    paths: [.requirements-python310-trigger]

permissions:
  contents: write

concurrency:
  group: requirements-python310-release
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      FINAL_TREE: /tmp/tsao-requirements-python310
      STATUS_FILE: .requirements-python310-status.json
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'
          cache: pip
      - name: Validate Python 3.10 durable tree
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          STAGE=prepare
          record_status() {
            local outcome="$1"
            local stage="$2"
            cd "$GITHUB_WORKSPACE"
            printf '{"outcome":"%s","python":"3.10","schema_version":"1.0","stage":"%s"}\n' "$outcome" "$stage" > "$STATUS_FILE"
            git add "$STATUS_FILE"
            git commit -m "Record Python 3.10 requirements gates: $outcome at $stage" || true
            git push origin HEAD:refs/heads/main || true
          }
          trap 'record_status failure "$STAGE"' ERR

          rm -rf "$FINAL_TREE"
          git worktree add --detach "$FINAL_TREE" HEAD
          cd "$FINAL_TREE"
          rm -f \
            .requirements-audit-trigger .requirements-audit-status.json \
            .requirements-generation-trigger .requirements-generation-status.json \
            .requirements-python310-trigger .requirements-python310-status.json
          printf '%s' '' | base64 -d > .github/workflows/ci.yml

          mapfile -t branches < <(git ls-remote --heads origin | sed 's#.*refs/heads/##' | sort -u)
          test "${#branches[@]}" -eq 1
          test "${branches[0]}" = main

          STAGE=install
          python -m pip install -e '.[validation,quality]'
          STAGE=quality
          python scripts/verify_all.py --profile quality
          STAGE=manifest
          python scripts/build_manifest.py
          STAGE=all
          python scripts/verify_all.py --profile all
          record_status success all
