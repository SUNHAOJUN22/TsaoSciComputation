name: Complete v3.0.2 on main

on:
  issues:
    types: [opened]

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: complete-v302-main
  cancel-in-progress: false

jobs:
  complete:
    if: >-
      github.repository == 'SUNHAOJUN22/TsaoSciComputation' &&
      github.event.issue.user.login == 'SUNHAOJUN22' &&
      github.event.issue.title == 'Complete v3.0.2 on main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip
      - name: Apply, generate, and pre-verify v3.0.2
        shell: bash
        run: |
          set -Eeuo pipefail
          : > /tmp/v302-completion.log
          exec > >(tee -a /tmp/v302-completion.log) 2>&1
          echo apply-and-preverify > /tmp/v302-completion-stage
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          python - <<'PY'
          from pathlib import Path

          dollar = '$'
          workflow = '''name: CI

          on:
            workflow_dispatch:
            pull_request:
              branches: [main]
            push:
              branches: [main]

          permissions:
            contents: read

          concurrency:
            group: ci-__DOLLAR__{{ github.workflow }}-__DOLLAR__{{ github.ref }}
            cancel-in-progress: true

          jobs:
            core:
              strategy:
                fail-fast: false
                matrix:
                  os: [ubuntu-latest, windows-latest, macos-latest]
                  python: ['3.10', '3.13']
              runs-on: __DOLLAR__{{ matrix.os }}
              timeout-minutes: 20
              steps:
                - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
                  with:
                    persist-credentials: false
                - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
                  with:
                    python-version: __DOLLAR__{{ matrix.python }}
                    cache: pip
                - run: python -m pip install -e '.[validation,quality]'
                - run: python scripts/verify_all.py --profile core

            quality:
              runs-on: ubuntu-latest
              timeout-minutes: 20
              steps:
                - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
                  with:
                    persist-credentials: false
                - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
                  with:
                    python-version: '3.13'
                    cache: pip
                - run: python -m pip install -e '.[validation,quality]'
                - run: python scripts/verify_all.py --profile quality

            package:
              runs-on: ubuntu-latest
              timeout-minutes: 25
              steps:
                - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
                  with:
                    persist-credentials: false
                - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
                  with:
                    python-version: '3.13'
                - run: python -m pip install -e '.[validation,quality]'
                - run: python scripts/verify_all.py --profile package
                - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
                  with:
                    name: TsaoSciComputation-release-candidate-__DOLLAR__{{ github.run_id }}-__DOLLAR__{{ github.run_attempt }}
                    path: dist/*
                    if-no-files-found: error
                    retention-days: 14

            benchmark:
              runs-on: ubuntu-latest
              timeout-minutes: 10
              continue-on-error: true
              steps:
                - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
                  with:
                    persist-credentials: false
                - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
                  with:
                    python-version: '3.13'
                    cache: pip
                - run: python -m pip install -e '.[validation,quality]'
                - run: python scripts/verify_all.py --profile benchmark
          '''
          lines = [line[10:] if line.startswith('          ') else line for line in workflow.splitlines()]
          Path('/tmp/production-ci.yml').write_text(
              '\n'.join(lines).replace('__DOLLAR__', dollar).lstrip() + '\n',
              encoding='utf-8',
          )
          PY

          python -m pip install -e '.[validation,quality]'
          python scripts/_apply_v302_governance.py apply
          python scripts/_apply_adapter_certification.py
          python scripts/_finalize_scientific_governance.py apply

          python - <<'PY'
          from pathlib import Path

          sbom = Path('scripts/build_sbom.py')
          text = sbom.read_text(encoding='utf-8')
          old = '''try:
              import tomllib
          except ModuleNotFoundError:  # pragma: no cover - Python 3.10 compatibility
              import tomli as tomllib  # type: ignore[import-not-found,no-redef]
          '''
          new = '''import sys

          if sys.version_info >= (3, 11):
              import tomllib
          else:  # pragma: no cover - exercised only on Python 3.10
              import tomli as tomllib
          '''
          if old in text:
              sbom.write_text(text.replace(old, new, 1), encoding='utf-8')

          governance = Path('scripts/_apply_v302_governance.py')
          text = governance.read_text(encoding='utf-8')
          old = '''    dependency = json.loads((ROOT / "reports/DEPENDENCY_AUDIT.json").read_text(encoding="utf-8"))
              vulnerable = [item for item in dependency.get("dependencies", []) if item.get("vulns")]
          '''
          new = '''    dependency_payload = json.loads(
                  (ROOT / "reports/DEPENDENCY_AUDIT.json").read_text(encoding="utf-8")
              )
              dependencies = (
                  dependency_payload
                  if isinstance(dependency_payload, list)
                  else dependency_payload.get("dependencies", [])
              )
              vulnerable = [item for item in dependencies if item.get("vulns")]
          '''
          if old not in text:
              raise SystemExit('dependency-audit parsing anchor not found')
          governance.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

          cp /tmp/production-ci.yml .github/workflows/ci.yml
          rm -f .github/workflows/deepen-maintenance.yml
          rm -f .github/workflows/v302-issue-finalizer.yml
          rm -f .deepen-maintenance
          rm -f reports/MAINTENANCE_GOVERNANCE_FAILURE.json
          rm -f reports/SCIENTIFIC_GOVERNANCE_FAILURE.json
          rm -f reports/V302_COMPLETION_FAILURE.json

          python scripts/sync_version_metadata.py --release-date 2026-07-24
          python -m pip install -e '.[validation,quality,security]'
          python -m ruff check --fix tsao_computation scripts tests _bootstrap.py
          python -m ruff format tsao_computation scripts tests _bootstrap.py
          python scripts/sync_package_assets.py
          python scripts/build_adapter_docs.py
          python scripts/build_workflow_docs.py
          python scripts/build_examples.py
          python scripts/run_scientific_benchmarks.py
          TSAO_COVERAGE_JSON=/tmp/maintenance-coverage.json python scripts/run_tests.py --coverage
          cp /tmp/maintenance-coverage.json /tmp/scientific-coverage.json
          cp /tmp/maintenance-coverage.json evidence/coverage.json
          mkdir -p reports
          python -m pip freeze --all > reports/DEPENDENCY_SNAPSHOT.txt
          timeout 300 python -m pip_audit --local --skip-editable --progress-spinner=off --format=json --output reports/DEPENDENCY_AUDIT.json
          python scripts/build_manifest.py

          rm -rf /tmp/TsaoSciComputation
          python scripts/install_skill.py --agent codex --scope project --target /tmp/TsaoSciComputation --force
          python scripts/install_skill.py --agent codex --scope project --target /tmp/TsaoSciComputation --validate
          python scripts/install_skill.py --agent codex --scope project --target /tmp/TsaoSciComputation --uninstall

          mapfile -t branches < <(gh api --paginate "repos/$GITHUB_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u)
          test "${#branches[@]}" -eq 1
          test "${branches[0]}" = main
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'
          cache: pip
      - name: Verify Python 3.10 core
        shell: bash
        run: |
          set -Eeuo pipefail
          exec > >(tee -a /tmp/v302-completion.log) 2>&1
          echo python-3.10-core > /tmp/v302-completion-stage
          python -m pip install -e '.[validation,quality,security]'
          python scripts/verify_all.py --profile core
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip
      - name: Finalize, fully verify, and publish main
        shell: bash
        run: |
          set -Eeuo pipefail
          exec > >(tee -a /tmp/v302-completion.log) 2>&1
          echo finalize-and-publish > /tmp/v302-completion-stage
          python -m pip install -e '.[validation,quality,security]'

          python scripts/_apply_v302_governance.py finalize
          python scripts/_finalize_scientific_governance.py finalize
          rm -f scripts/_apply_adapter_certification.py
          rm -f scripts/_finalize_scientific_governance.py
          rm -f reports/V302_COMPLETION_FAILURE.json

          python scripts/build_manifest.py
          python scripts/verify_all.py --profile all
          python scripts/verify_all.py --profile benchmark
          python scripts/build_manifest.py
          python scripts/sync_version_metadata.py --check
          python scripts/validate_repository.py
          python scripts/validate_schemas.py
          python scripts/validate_adapter_metadata.py
          TSAO_COVERAGE_JSON=/tmp/maintenance-coverage.json python scripts/check_critical_coverage.py
          python scripts/build_manifest.py --check
          python -m pytest -q

          mapfile -t branches < <(gh api --paginate "repos/$GITHUB_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u)
          test "${#branches[@]}" -eq 1
          test "${branches[0]}" = main

          git add -A
          git diff --cached --quiet && { echo 'No completion changes were produced' >&2; exit 1; }
          git commit -m 'Complete and verify v3.0.2 on main'
          git push origin HEAD:refs/heads/main

          gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --comment 'v3.0.2 was completed and fully verified directly on main. No branch was created; the temporary completion workflow restored the normal production CI before committing.'

          if gh release view v3.0.2 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo 'Release v3.0.2 already exists; no duplicate dispatch needed.'
          elif git ls-remote --exit-code --tags origin refs/tags/v3.0.2 >/dev/null 2>&1; then
            echo 'Tag v3.0.2 exists without a release.' >&2
            exit 1
          else
            gh workflow run release.yml --ref main -f tag=v3.0.2
          fi
      - name: Record exact completion failure
        if: ${{ failure() }}
        shell: bash
        run: |
          set +e
          export FAILED_STAGE="$(cat /tmp/v302-completion-stage 2>/dev/null || echo unknown)"
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          log = Path('/tmp/v302-completion.log')
          tail = '\n'.join(log.read_text(encoding='utf-8', errors='replace').splitlines()[-140:]) if log.exists() else ''
          payload = {
              'schema_version': '1.0',
              'status': 'FAILED',
              'stage': os.environ['FAILED_STAGE'],
              'branch': 'main',
              'temporary_branch_created': False,
              'failed_at_utc': datetime.now(timezone.utc).isoformat(),
              'log_tail': tail,
          }
          path = Path('reports/V302_COMPLETION_FAILURE.json')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/V302_COMPLETION_FAILURE.json
          git commit -m "Record v3.0.2 completion failure at $FAILED_STAGE" || true
          git push origin HEAD:refs/heads/main || true
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "v3.0.2 completion failed at stage: $FAILED_STAGE. Machine-readable evidence was committed to reports/V302_COMPLETION_FAILURE.json." || true
