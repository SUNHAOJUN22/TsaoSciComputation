name: Final dual-version repository audit

on:
  push:
    branches: [main]
    paths: [.final-ci-audit-trigger]

permissions:
  contents: write

concurrency:
  group: final-dual-version-repository-audit
  cancel-in-progress: true

jobs:
  python310-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'
          cache: pip
      - name: Run complete Python 3.10 release gates
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/python310-compatibility-audit.yml \
            .github/workflows/python310-compatibility-audit-v2.yml \
            .github/workflows/python310-compatibility-audit-v3.yml \
            .github/workflows/final-python-compatibility.yml \
            .python310-compatibility-trigger \
            .python310-compatibility-trigger-v2 \
            .python310-compatibility-trigger-v3 \
            .python310-compatibility-status.json \
            .final-python-compatibility-trigger \
            .final-ci-audit-trigger
          cat > .github/workflows/ci.yml <<'FINAL_CI'
          name: CI

          on:
            workflow_dispatch:
            pull_request:
              branches: [main]
            push:
              branches: [main]

          permissions:
            contents: read

          concurrency:
            group: ci-${{ github.workflow }}-${{ github.ref }}
            cancel-in-progress: true

          jobs:
            core:
              strategy:
                fail-fast: false
                matrix:
                  os: [ubuntu-latest, windows-latest, macos-latest]
                  python: ['3.10', '3.13']
              runs-on: ${{ matrix.os }}
              timeout-minutes: 20
              steps:
                - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
                  with:
                    persist-credentials: false
                - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
                  with:
                    python-version: ${{ matrix.python }}
                    cache: pip
                - run: python -m pip install -e '.[validation,quality]'
                - run: python scripts/verify_all.py --profile core

            quality:
              runs-on: ubuntu-latest
              timeout-minutes: 20
              steps:
                - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
                  with:
                    persist-credentials: false
                - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
                  with:
                    python-version: '3.13'
                    cache: pip
                - run: python -m pip install -e '.[validation,quality]'
                - run: python scripts/verify_all.py --profile quality
                - run: python scripts/verify_all.py --profile benchmark

            package:
              runs-on: ubuntu-latest
              timeout-minutes: 25
              steps:
                - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
                  with:
                    persist-credentials: false
                - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
                  with:
                    python-version: '3.13'
                - run: python -m pip install -e '.[validation,quality]'
                - run: python scripts/verify_all.py --profile package
                - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
                  with:
                    name: TsaoSciComputation-release-candidate
                    path: dist/*
                    if-no-files-found: error
                    retention-days: 14
          FINAL_CI
          sed -i 's/^          //' .github/workflows/ci.yml
          python -m pip install -e '.[validation,quality]'
          python scripts/verify_all.py --profile quality
          python scripts/build_manifest.py
          python scripts/verify_all.py --profile all

  python313-finalize:
    needs: python310-release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip
      - name: Run Python 3.13 gates and refresh durable evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f \
            .github/workflows/python310-compatibility-audit.yml \
            .github/workflows/python310-compatibility-audit-v2.yml \
            .github/workflows/python310-compatibility-audit-v3.yml \
            .github/workflows/final-python-compatibility.yml \
            .python310-compatibility-trigger \
            .python310-compatibility-trigger-v2 \
            .python310-compatibility-trigger-v3 \
            .python310-compatibility-status.json \
            .final-python-compatibility-trigger \
            .final-ci-audit-trigger
          cat > .github/workflows/ci.yml <<'FINAL_CI'
          name: CI

          on:
            workflow_dispatch:
            pull_request:
              branches: [main]
            push:
              branches: [main]

          permissions:
            contents: read

          concurrency:
            group: ci-${{ github.workflow }}-${{ github.ref }}
            cancel-in-progress: true

          jobs:
            core:
              strategy:
                fail-fast: false
                matrix:
                  os: [ubuntu-latest, windows-latest, macos-latest]
                  python: ['3.10', '3.13']
              runs-on: ${{ matrix.os }}
              timeout-minutes: 20
              steps:
                - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
                  with:
                    persist-credentials: false
                - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
                  with:
                    python-version: ${{ matrix.python }}
                    cache: pip
                - run: python -m pip install -e '.[validation,quality]'
                - run: python scripts/verify_all.py --profile core

            quality:
              runs-on: ubuntu-latest
              timeout-minutes: 20
              steps:
                - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
                  with:
                    persist-credentials: false
                - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
                  with:
                    python-version: '3.13'
                    cache: pip
                - run: python -m pip install -e '.[validation,quality]'
                - run: python scripts/verify_all.py --profile quality
                - run: python scripts/verify_all.py --profile benchmark

            package:
              runs-on: ubuntu-latest
              timeout-minutes: 25
              steps:
                - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
                  with:
                    persist-credentials: false
                - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
                  with:
                    python-version: '3.13'
                - run: python -m pip install -e '.[validation,quality]'
                - run: python scripts/verify_all.py --profile package
                - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
                  with:
                    name: TsaoSciComputation-release-candidate
                    path: dist/*
                    if-no-files-found: error
                    retention-days: 14
          FINAL_CI
          sed -i 's/^          //' .github/workflows/ci.yml
          python -m pip install -e '.[validation,quality]'
          python -m ruff format tsao_computation/repository_audit.py tests/test_python_compatibility.py
          python scripts/verify_all.py --profile quality
          python scripts/build_manifest.py
          python scripts/verify_all.py --profile all
          python scripts/verify_all.py --profile benchmark
          python -m coverage json -o /tmp/tsao-final-dual-version-coverage.json

          python - <<'PY'
          import json
          import re
          import subprocess
          import sys
          from pathlib import Path

          root = Path('.')
          collected = subprocess.run(
              [sys.executable, '-m', 'pytest', '--collect-only', '-q'],
              check=True,
              capture_output=True,
              text=True,
          )
          match = re.search(r'(\d+) tests? collected', collected.stdout + collected.stderr)
          if match is None:
              raise SystemExit('unable to determine test count')
          tests = int(match.group(1))
          totals = json.loads(Path('/tmp/tsao-final-dual-version-coverage.json').read_text(encoding='utf-8'))['totals']
          statements = 100.0 * (totals['num_statements'] - totals['missing_lines']) / totals['num_statements']
          branches = 100.0 * (totals['num_branches'] - totals['missing_branches']) / totals['num_branches']
          security = json.loads(Path('evidence/security-scan.json').read_text(encoding='utf-8'))

          baseline_path = Path('evidence/quality-baseline.json')
          baseline = json.loads(baseline_path.read_text(encoding='utf-8'))
          baseline['counts']['tests_passed'] = tests
          baseline['counts']['tests_failed'] = 0
          baseline['coverage'] = {
              'branches_percent': branches,
              'missing_branches': totals['missing_branches'],
              'missing_statements': totals['missing_lines'],
              'statements_percent': statements,
          }
          baseline['security']['repository_findings'] = len(security['findings'])
          baseline_path.write_text(json.dumps(baseline, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          Path('reports/SECURITY_SCAN.json').write_text(
              json.dumps(security, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          report_path = Path('reports/REMOTE_FINALIZATION.json')
          report = json.loads(report_path.read_text(encoding='utf-8'))
          report['tests'] = {'errors': 0, 'failures': 0, 'passed': tests}
          report['security'] = {'files_scanned': security['files_scanned'], 'findings': len(security['findings'])}
          report['python_compatibility'] = {
              'minimum_supported': '3.10',
              'python_310_release_gates': 'VALIDATED',
              'python_313_release_gates': 'VALIDATED',
              'python_313_benchmark': 'VALIDATED_SEPARATELY',
              'runtime_compatibility_dependency_added': False,
              'status': 'VALIDATED',
              'temporary_branch_created': False,
          }
          report['coverage'].update({
              'covered_branches': totals['covered_branches'],
              'covered_lines': totals['covered_lines'],
              'excluded_lines': totals['excluded_lines'],
              'missing_branches': totals['missing_branches'],
              'missing_lines': totals['missing_lines'],
              'num_branches': totals['num_branches'],
              'num_partial_branches': totals['num_partial_branches'],
              'num_statements': totals['num_statements'],
              'percent_branches_covered': branches,
              'percent_branches_covered_display': f'{branches:.0f}',
              'percent_covered': totals['percent_covered'],
              'percent_covered_display': totals['percent_covered_display'],
              'percent_statements_covered': statements,
              'percent_statements_covered_display': f'{statements:.0f}',
          })
          report_path.write_text(json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          updates = (
              ('README.md', '## Verification\n', 'The minimum supported interpreter is Python 3.10; release gates are validated on Python 3.10 and 3.13.', r'\| Tests \| \d+ passed, \d+ failed \|', f'| Tests | {tests} passed, 0 failed |', r'\| Statement / branch coverage \| [^|]+ \|', f'| Statement / branch coverage | {statements:.2f}% / {branches:.2f}% |'),
              ('README.zh-CN.md', '## 统一验证\n', '最低支持 Python 3.10；发布门禁在 Python 3.10 与 3.13 上均完成验证。', r'\| 自动测试 \| \d+ 通过，\d+ 失败 \|', f'| 自动测试 | {tests} 通过，0 失败 |', r'\| 语句 / 分支覆盖率 \| [^|]+ \|', f'| 语句 / 分支覆盖率 | {statements:.2f}% / {branches:.2f}% |'),
          )
          for filename, marker, note, test_pattern, test_value, coverage_pattern, coverage_value in updates:
              path = Path(filename)
              content = path.read_text(encoding='utf-8')
              for old_note in (
                  'The minimum supported interpreter is Python 3.10; CI validates Python 3.10 and 3.13.\n',
                  '最低支持 Python 3.10；CI 对 Python 3.10 与 3.13 进行验证。\n',
              ):
                  content = content.replace(old_note, '')
              if note not in content:
                  content = content.replace(marker, marker + '\n' + note + '\n', 1)
              content = re.sub(test_pattern, test_value, content)
              path.write_text(re.sub(coverage_pattern, coverage_value, content), encoding='utf-8')
          PY

          python scripts/build_manifest.py
          python scripts/build_manifest.py --check
          python scripts/verify_all.py --profile core
          git add README.md README.zh-CN.md benchmarks/latest.json evidence reports manifest.json
          if ! git diff --cached --quiet; then
            git commit -m 'Validate Python 3.10 and 3.13 release gates'
            git push origin HEAD:refs/heads/main
          fi
