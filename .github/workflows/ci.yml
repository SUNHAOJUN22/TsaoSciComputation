name: Format Python compatibility fix

on:
  push:
    branches: [main]
    paths: [.final-ci-audit-trigger]

permissions:
  contents: write

concurrency:
  group: final-dual-version-repository-audit
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip
      - name: Format and commit compatibility files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          python -m pip install -e '.[quality]'
          python -m ruff format tsao_computation/repository_audit.py tests/test_python_compatibility.py
          git add tsao_computation/repository_audit.py tests/test_python_compatibility.py
          if ! git diff --cached --quiet; then
            git commit -m 'Format Python 3.10 compatibility fix'
            git push origin HEAD:refs/heads/main
          fi
          printf '{\n  "outcome": "formatted",\n  "schema_version": "1.0"\n}\n' > .final-ci-status.json
          git add .final-ci-status.json
          git commit -m 'Record compatibility formatting completion'
          git push origin HEAD:refs/heads/main
