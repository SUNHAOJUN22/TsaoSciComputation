name: Final ordinary-source main consolidation

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: final-main-consolidation
  cancel-in-progress: false

jobs:
  validate-and-promote:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/final-main-bootstrap'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out exact bootstrap payload
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Reconstruct and verify the single Git bundle
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          import base64
          import hashlib
          import json
          from pathlib import Path

          root = Path('.bootstrap')
          manifest = json.loads((root / 'manifest.json').read_text(encoding='utf-8'))
          expected = {
              'encoding': 'python-base85',
              'parts': 24,
              'bundle_bytes': 332335,
              'encoded_chars': 415419,
              'bundle_sha256': 'f01ddbd1db634574e4e577c2cf4b568ae064b6c2e1be092776fa2e2d32280ffc',
              'expected_commit': 'f4d5bf02952670263387796899c2551113dffe8f',
          }
          for key, value in expected.items():
              if manifest.get(key) != value:
                  raise SystemExit(f'manifest mismatch for {key}: {manifest.get(key)!r}')
          part_hashes = manifest.get('part_sha256')
          if not isinstance(part_hashes, list) or len(part_hashes) != expected['parts']:
              raise SystemExit('invalid part hash inventory')
          encoded_parts: list[str] = []
          for index, expected_hash in enumerate(part_hashes):
              path = root / f'part-{index:03d}'
              if path.is_symlink() or not path.is_file():
                  raise SystemExit(f'missing or unsafe part: {path}')
              payload = path.read_bytes()
              actual = hashlib.sha256(payload).hexdigest()
              if actual != expected_hash:
                  raise SystemExit(f'part hash mismatch: {path} {actual}')
              encoded_parts.append(payload.decode('ascii'))
          encoded = ''.join(encoded_parts)
          if len(encoded) != expected['encoded_chars']:
              raise SystemExit('encoded bundle length mismatch')
          bundle = base64.b85decode(encoded.encode('ascii'))
          if len(bundle) != expected['bundle_bytes']:
              raise SystemExit('bundle byte length mismatch')
          actual_bundle = hashlib.sha256(bundle).hexdigest()
          if actual_bundle != expected['bundle_sha256']:
              raise SystemExit(f'bundle SHA-256 mismatch: {actual_bundle}')
          Path('/tmp/final-main.bundle').write_bytes(bundle)
          PY
          git bundle verify /tmp/final-main.bundle
          rm -rf /tmp/final-main-source
          git clone /tmp/final-main.bundle /tmp/final-main-source
          git -C /tmp/final-main-source checkout --detach f4d5bf02952670263387796899c2551113dffe8f
          test "$(git -C /tmp/final-main-source rev-parse HEAD)" = "f4d5bf02952670263387796899c2551113dffe8f"
          test "$(git -C /tmp/final-main-source ls-files | wc -l)" -eq 782
          test -f /tmp/final-main-source/SKILL.md
          test "$(tr -d '[:space:]' < /tmp/final-main-source/VERSION)" = "3.0.0"
          test ! -e /tmp/final-main-source/.release_source
          test ! -e /tmp/final-main-source/.audit_source_v101
          test ! -e /tmp/final-main-source/.audit_patch_v102

      - name: Set up verification Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'
          cache: pip

      - name: Install validation toolchain
        working-directory: /tmp/final-main-source
        run: python -m pip install -e '.[validation,test]'

      - name: Run complete frozen quality gate
        working-directory: /tmp/final-main-source
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
        run: |
          set -euo pipefail
          mkdir -p reports
          python -m pytest -q -m 'not integration and not live' --junitxml=reports/JUNIT_CORE.xml
          python -m pytest -q -m integration_layout tests/test_generated_layout_and_scripts.py --junitxml=reports/JUNIT_INTEGRATION_LAYOUT.xml
          python -m pytest -q -m integration_release tests/test_release_engineering.py --junitxml=reports/JUNIT_INTEGRATION_RELEASE.xml
          python -m pytest -q -m integration_cli tests/test_cli_integration.py --junitxml=reports/JUNIT_INTEGRATION_CLI.xml
          python -m pytest -q -m 'durability and not integration and not live' --junitxml=reports/JUNIT_DURABILITY.xml
          python -m coverage erase
          python -m coverage run --branch -m pytest -q -m 'not integration and not live'
          python -m coverage report --fail-under=85
          python -m coverage json -o reports/COVERAGE.json
          python -m ruff check tsao_computation scripts tests
          python -m ruff format --check tsao_computation scripts tests
          python -m mypy tsao_computation scripts
          python scripts/security_scan.py --output reports/SECURITY_SCAN.json
          python -m bandit -r tsao_computation scripts -f json -o reports/BANDIT.json
          python scripts/dependency_audit.py --output reports/PIP_AUDIT.json
          python scripts/sync_package_assets.py --check
          python scripts/audit_repository.py --json > reports/REPOSITORY_AUDIT.json
          python scripts/validate_capabilities.py > reports/CAPABILITY_VALIDATION.json
          python scripts/deep_audit.py --output reports/DEEP_AUDIT.json
          python scripts/mutation_gate.py --jobs 8 --output reports/MUTATION_REPORT.json

      - name: Verify reproducible build and package isolation
        working-directory: /tmp/final-main-source
        env:
          SOURCE_DATE_EPOCH: '1700000000'
        run: |
          set -euo pipefail
          rm -rf /tmp/tsao-a /tmp/tsao-b /tmp/tsao-wheel-venv /tmp/tsao-sdist-venv
          mkdir -p /tmp/tsao-a /tmp/tsao-b
          python -m build --no-isolation --wheel --outdir /tmp/tsao-a
          python -m build --no-isolation --wheel --outdir /tmp/tsao-b
          python scripts/build_reproducible_sdist.py --output /tmp/tsao-a/TsaoSciComputation-3.0.0.tar.gz --epoch 1700000000
          python scripts/build_reproducible_sdist.py --output /tmp/tsao-b/TsaoSciComputation-3.0.0.tar.gz --epoch 1700000000
          python scripts/package_release.py --output /tmp/tsao-a/TsaoSciComputation-3.0.0.zip --epoch 1700000000
          python scripts/package_release.py --output /tmp/tsao-b/TsaoSciComputation-3.0.0.zip --epoch 1700000000
          cmp /tmp/tsao-a/*.whl /tmp/tsao-b/*.whl
          cmp /tmp/tsao-a/*.tar.gz /tmp/tsao-b/*.tar.gz
          cmp /tmp/tsao-a/*.zip /tmp/tsao-b/*.zip
          python scripts/verify_package.py /tmp/tsao-a/*.whl
          python -m venv --system-site-packages /tmp/tsao-wheel-venv
          python -m venv --system-site-packages /tmp/tsao-sdist-venv
          /tmp/tsao-wheel-venv/bin/python -m pip install --no-deps /tmp/tsao-a/*.whl
          /tmp/tsao-sdist-venv/bin/python -m pip install --no-deps --no-build-isolation /tmp/tsao-a/*.tar.gz
          cd /tmp
          env -u PYTHONPATH /tmp/tsao-wheel-venv/bin/python /tmp/final-main-source/scripts/verify_installed_package.py --installation-source wheel --artifact /tmp/tsao-a/tsao_scicomputation-3.0.0-py3-none-any.whl
          env -u PYTHONPATH /tmp/tsao-sdist-venv/bin/python /tmp/final-main-source/scripts/verify_installed_package.py --installation-source sdist --artifact /tmp/tsao-a/TsaoSciComputation-3.0.0.tar.gz

      - name: Atomically promote verified ordinary source to main
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          git -C /tmp/final-main-source config user.name 'github-actions[bot]'
          git -C /tmp/final-main-source config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git -C /tmp/final-main-source remote add github "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"
          git -C /tmp/final-main-source push github HEAD:refs/heads/main --force
          remote_sha=$(git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git" refs/heads/main | awk '{print $1}')
          test "$remote_sha" = "f4d5bf02952670263387796899c2551113dffe8f"

      - name: Dispatch final single-main governance
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          API_URL: ${{ github.api_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, urllib.request
          url=f"{os.environ['API_URL']}/repos/{os.environ['REPOSITORY']}/actions/workflows/single-main-governance.yml/dispatches"
          req=urllib.request.Request(url, data=json.dumps({'ref':'main'}).encode(), method='POST', headers={
            'Authorization':f"Bearer {os.environ['GH_TOKEN']}",
            'Accept':'application/vnd.github+json',
            'X-GitHub-Api-Version':'2022-11-28',
            'Content-Type':'application/json',
          })
          with urllib.request.urlopen(req, timeout=30) as response:
              if response.status != 204:
                  raise SystemExit(f'unexpected dispatch status: {response.status}')
          PY
