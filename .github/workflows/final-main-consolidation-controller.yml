name: Final verified single-main consolidation

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: final-verified-single-main-consolidation
  cancel-in-progress: false

jobs:
  validate-promote-govern:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/final-main-v3'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out trusted main base only
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Reconstruct and safely extract the hash-bound ordinary source
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          rm -rf /tmp/tsao-payload /tmp/tsao-extracted
          mkdir -p /tmp/tsao-payload /tmp/tsao-extracted
          git fetch --no-tags origin "$HEAD_SHA"
          for name in manifest.json finalizer-000 finalizer-001 finalizer-002 part-000 part-001 part-002 part-003 part-004 part-005 part-006 part-007 part-008 part-009 part-010 part-011; do
            git show "$HEAD_SHA:.final_source/$name" > "/tmp/tsao-payload/$name"
          done
          python - <<'PY'
          from __future__ import annotations
          import base64, hashlib, json, tarfile
          from pathlib import Path, PurePosixPath

          payload = Path('/tmp/tsao-payload')
          manifest_path = payload / 'manifest.json'
          if hashlib.sha256(manifest_path.read_bytes()).hexdigest() != '24ca19f0f2b3c780140039ba16195f86bbd684cad39200f61cf20f514ba7ef89':
              raise SystemExit('transfer manifest SHA-256 mismatch')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          expected = {
              'schema_version': '1.0',
              'encoding': 'base64',
              'archive': 'TsaoSciComputation-3.0.0.tar.gz',
              'archive_bytes': 134637,
              'archive_sha256': 'dd1c663595004db5d680eaccd85623fe22022290258e3107398f946297e9cdd2',
              'part_count': 12,
              'part_size_chars': 15000,
              'parts': [f'part-{index:03d}' for index in range(12)],
              'part_sha256': [
                  '21c39c14e970beb7d03331406dad997bdb58b71eee2b78d58f426df499f0b4a1',
                  '05de891cc7a5107042043f6acc6004a1c12cd64164e309db393fa96e4f19073e',
                  '183fc3a280eb7f0c2198abb93feb82a111ff27d5a21d21983a81098948c4852c',
                  '3403940f5eb07b6430075a5505fe7e259ef3995210de054f1a4e78c3d5781012',
                  '613799458c79dabc46762211cf4168d4fe0be6a8c334d209c59bafc512abb4e6',
                  '5d9d9d2720cfa34e419aef2146c3a29f62f66b534417460a7c681daf0edca0c3',
                  '2aa11da022f8c9eea0b597291f639ff2692eaf4d9312677623eefb77fbe4b844',
                  '9feb32c9d1448acf12a3ae9b2e644ff765cd457344ced5be52b2ebe246219ae5',
                  '1a6dcdd2e652429d96e9bcacaf3214d73ca6d4acdca898ac1cb046323696dfd9',
                  '5585fd64a447df930b2762aff645e6183db40bd149cae212a452062c0cf13f80',
                  'ffb1b2b64c52966a8470aaf2252f09eb4b9f45be38fed90d16db9a6b0cc9ce55',
                  'c9afc181efcb8080111ad99a7d60450a98ddab016157376f8d8bacb36eccfa2a',
              ],
              'finalizer_bytes': 20990,
              'finalizer_parts': ['finalizer-000', 'finalizer-001', 'finalizer-002'],
              'finalizer_part_sha256': [
                  '387d208cf4552f222ce90cacc14097d90c7b9b3c42d49ae99d2e6f6261d24c9f',
                  '04055854b66754b7ffdb1e396701ea2cd8ce58a22ccc22b3a6ccc2b41bf591f1',
                  '14eeb192753150d410df7b36cc156c788b849df14db7c6fefd1df8aee052f1fe',
              ],
              'finalizer_sha256': '40f709b166819f5a693c46b858664fa9507442a25ea67be4e8d9ea9a8f6bcdbb',
          }
          if manifest != expected:
              raise SystemExit('transfer manifest content mismatch')
          finalizer_bytes = []
          for name, digest in zip(expected['finalizer_parts'], expected['finalizer_part_sha256'], strict=True):
              part = payload / name
              data = part.read_bytes()
              if part.is_symlink() or hashlib.sha256(data).hexdigest() != digest:
                  raise SystemExit(f'finalizer part mismatch: {name}')
              finalizer_bytes.append(data)
          finalizer_data = b''.join(finalizer_bytes)
          if len(finalizer_data) != expected['finalizer_bytes'] or hashlib.sha256(finalizer_data).hexdigest() != expected['finalizer_sha256']:
              raise SystemExit('trusted finalizer SHA-256 mismatch')
          finalizer = payload / 'finalizer.py'
          finalizer.write_bytes(finalizer_data)
          encoded = []
          for name, digest in zip(expected['parts'], expected['part_sha256'], strict=True):
              part = payload / name
              data = part.read_bytes()
              if part.is_symlink() or hashlib.sha256(data).hexdigest() != digest:
                  raise SystemExit(f'transfer part mismatch: {name}')
              encoded.append(data)
          archive_bytes = base64.b64decode(b''.join(encoded), validate=True)
          if len(archive_bytes) != expected['archive_bytes']:
              raise SystemExit('archive byte length mismatch')
          if hashlib.sha256(archive_bytes).hexdigest() != expected['archive_sha256']:
              raise SystemExit('archive SHA-256 mismatch')
          archive_path = Path('/tmp/TsaoSciComputation-3.0.0.tar.gz')
          archive_path.write_bytes(archive_bytes)

          root = Path('/tmp/tsao-extracted')
          total = 0
          with tarfile.open(archive_path, 'r:gz') as archive:
              members = archive.getmembers()
              if not members or len(members) > 2000:
                  raise SystemExit('unsafe archive member count')
              for member in members:
                  name = PurePosixPath(member.name)
                  if name.is_absolute() or '..' in name.parts or not name.parts:
                      raise SystemExit(f'unsafe archive path: {member.name!r}')
                  if name.parts[0] != 'TsaoSciComputation-3.0.0':
                      raise SystemExit(f'unexpected archive root: {member.name!r}')
                  if member.issym() or member.islnk() or member.isdev() or member.isfifo():
                      raise SystemExit(f'unsafe archive member: {member.name!r}')
                  if member.size < 0 or member.size > 20 * 1024 * 1024:
                      raise SystemExit(f'unsafe archive member size: {member.name!r}')
                  total += member.size
                  if total > 100 * 1024 * 1024:
                      raise SystemExit('archive expansion limit exceeded')
              archive.extractall(root, members=members, filter='data')
          source = root / 'TsaoSciComputation-3.0.0'
          required = ['SKILL.md', 'VERSION', 'README.md', 'pyproject.toml', 'manifest.json',
                      'tsao_computation', 'tests', 'scripts', 'schemas', 'registry',
                      'capability-index', 'adapters', 'skills/workflows', '.github/workflows']
          missing = [item for item in required if not (source / item).exists()]
          if missing or (source / 'VERSION').read_text().strip() != '3.0.0':
              raise SystemExit(f'invalid ordinary source: {missing}')
          for forbidden in ('.release_source', '.audit_source_v101', '.audit_patch_v102', '.bootstrap', '.final_source'):
              if (source / forbidden).exists():
                  raise SystemExit(f'forbidden transfer path: {forbidden}')
          print(json.dumps({'members': len(members), 'expanded_bytes': total,
                            'archive_sha256': expected['archive_sha256']}, sort_keys=True))
          PY

      - name: Set up verification Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'

      - name: Install validation toolchain
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp/tsao-extracted/TsaoSciComputation-3.0.0
          python -m pip install -e '.[validation,quality]'

      - name: Validate, promote, verify remote CI, and enforce single-main governance
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
          API_URL: ${{ github.api_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          python /tmp/tsao-payload/finalizer.py \
            --workspace "$GITHUB_WORKSPACE" \
            --source-root /tmp/tsao-extracted/TsaoSciComputation-3.0.0 \
            --repository "$REPOSITORY" \
            --api-url "$API_URL" \
            --token "$GH_TOKEN" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --run-id "$RUN_ID"

      - name: Upload final validation and governance evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: TsaoSciComputation-v3.0.0-single-main-evidence
          path: /tmp/finalization-artifacts
          if-no-files-found: error
          retention-days: 30
