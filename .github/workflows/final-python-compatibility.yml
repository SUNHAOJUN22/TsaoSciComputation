name: Final Python compatibility verification

on:
  push:
    branches: [main]
    paths: [.final-python-compatibility-trigger]

permissions:
  contents: write

concurrency:
  group: python310-compatibility-audit
  cancel-in-progress: true

jobs:
  python310:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'
          cache: pip
      - name: Run minimum-version release gates
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/python310-compatibility-audit.yml \
            .github/workflows/python310-compatibility-audit-v2.yml \
            .github/workflows/python310-compatibility-audit-v3.yml \
            .github/workflows/final-python-compatibility.yml \
            .python310-compatibility-trigger \
            .python310-compatibility-trigger-v2 \
            .python310-compatibility-trigger-v3 \
            .python310-compatibility-status.json \
            .final-python-compatibility-trigger
          python -m pip install -e '.[validation,quality]'
          python scripts/build_manifest.py
          python scripts/verify_all.py --profile all

  python313:
    needs: python310
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      FINAL_TREE: /tmp/tsao-final-python-compatibility
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip
      - name: Verify, refresh evidence, and publish
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -rf "$FINAL_TREE"
          git worktree add --detach "$FINAL_TREE" HEAD
          cd "$FINAL_TREE"
          rm -f \
            .github/workflows/python310-compatibility-audit.yml \
            .github/workflows/python310-compatibility-audit-v2.yml \
            .github/workflows/python310-compatibility-audit-v3.yml \
            .github/workflows/final-python-compatibility.yml \
            .python310-compatibility-trigger \
            .python310-compatibility-trigger-v2 \
            .python310-compatibility-trigger-v3 \
            .python310-compatibility-status.json \
            .final-python-compatibility-trigger

          python -m pip install -e '.[validation,quality]'
          python -m ruff format tsao_computation/repository_audit.py tests/test_python_compatibility.py
          python scripts/build_manifest.py
          python scripts/verify_all.py --profile all
          python scripts/verify_all.py --profile benchmark
          python -m coverage json -o /tmp/tsao-final-pycompat-coverage.json

          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          root = Path(os.environ['FINAL_TREE'])
          collected = subprocess.run(
              [sys.executable, '-m', 'pytest', '--collect-only', '-q'],
              cwd=root,
              check=True,
              capture_output=True,
              text=True,
          )
          match = re.search(r'(\d+) tests? collected', collected.stdout + collected.stderr)
          if match is None:
              raise SystemExit('unable to determine test count')
          tests = int(match.group(1))
          totals = json.loads(Path('/tmp/tsao-final-pycompat-coverage.json').read_text(encoding='utf-8'))['totals']
          statements = 100.0 * (totals['num_statements'] - totals['missing_lines']) / totals['num_statements']
          branches = 100.0 * (totals['num_branches'] - totals['missing_branches']) / totals['num_branches']
          security = json.loads((root / 'evidence/security-scan.json').read_text(encoding='utf-8'))

          baseline_path = root / 'evidence/quality-baseline.json'
          baseline = json.loads(baseline_path.read_text(encoding='utf-8'))
          baseline['counts']['tests_passed'] = tests
          baseline['counts']['tests_failed'] = 0
          baseline['coverage'] = {
              'branches_percent': branches,
              'missing_branches': totals['missing_branches'],
              'missing_statements': totals['missing_lines'],
              'statements_percent': statements,
          }
          baseline['security']['repository_findings'] = len(security['findings'])
          baseline_path.write_text(json.dumps(baseline, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          report_path = root / 'reports/REMOTE_FINALIZATION.json'
          report = json.loads(report_path.read_text(encoding='utf-8'))
          report['tests'] = {'errors': 0, 'failures': 0, 'passed': tests}
          report['security'] = {'files_scanned': security['files_scanned'], 'findings': len(security['findings'])}
          report['python_compatibility'] = {
              'minimum_supported': '3.10',
              'python_310_release_gates': 'VALIDATED',
              'python_313_release_gates': 'VALIDATED',
              'python_313_benchmark': 'VALIDATED_SEPARATELY',
              'runtime_compatibility_dependency_added': False,
              'status': 'VALIDATED',
              'temporary_branch_created': False,
          }
          report['coverage'].update({
              'covered_branches': totals['covered_branches'],
              'covered_lines': totals['covered_lines'],
              'excluded_lines': totals['excluded_lines'],
              'missing_branches': totals['missing_branches'],
              'missing_lines': totals['missing_lines'],
              'num_branches': totals['num_branches'],
              'num_partial_branches': totals['num_partial_branches'],
              'num_statements': totals['num_statements'],
              'percent_branches_covered': branches,
              'percent_branches_covered_display': f'{branches:.0f}',
              'percent_covered': totals['percent_covered'],
              'percent_covered_display': totals['percent_covered_display'],
              'percent_statements_covered': statements,
              'percent_statements_covered_display': f'{statements:.0f}',
          })
          report_path.write_text(json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          readme_updates = (
              ('README.md', '## Verification\n', 'The minimum supported interpreter is Python 3.10; release gates are validated on Python 3.10 and 3.13.', r'\| Tests \| \d+ passed, \d+ failed \|', f'| Tests | {tests} passed, 0 failed |', r'\| Statement / branch coverage \| [^|]+ \|', f'| Statement / branch coverage | {statements:.2f}% / {branches:.2f}% |'),
              ('README.zh-CN.md', '## 统一验证\n', '最低支持 Python 3.10；发布门禁在 Python 3.10 与 3.13 上均完成验证。', r'\| 自动测试 \| \d+ 通过，\d+ 失败 \|', f'| 自动测试 | {tests} 通过，0 失败 |', r'\| 语句 / 分支覆盖率 \| [^|]+ \|', f'| 语句 / 分支覆盖率 | {statements:.2f}% / {branches:.2f}% |'),
          )
          for filename, marker, note, test_pattern, test_value, cov_pattern, cov_value in readme_updates:
              path = root / filename
              content = path.read_text(encoding='utf-8')
              old_notes = (
                  'The minimum supported interpreter is Python 3.10; CI validates Python 3.10 and 3.13.\n',
                  '最低支持 Python 3.10；CI 对 Python 3.10 与 3.13 进行验证。\n',
              )
              for old_note in old_notes:
                  content = content.replace(old_note, '')
              if note not in content:
                  content = content.replace(marker, marker + '\n' + note + '\n', 1)
              content = re.sub(test_pattern, test_value, content)
              path.write_text(re.sub(cov_pattern, cov_value, content), encoding='utf-8')
          PY

          python scripts/build_manifest.py
          python scripts/build_manifest.py --check
          python scripts/verify_all.py --profile core

          cd "$GITHUB_WORKSPACE"
          : > /tmp/durable-paths.txt
          git -C "$FINAL_TREE" diff --name-only | while IFS= read -r path; do
            case "$path" in
              .github/workflows/python310-compatibility-audit.yml|.github/workflows/python310-compatibility-audit-v2.yml|.github/workflows/python310-compatibility-audit-v3.yml|.github/workflows/final-python-compatibility.yml|.python310-compatibility-trigger|.python310-compatibility-trigger-v2|.python310-compatibility-trigger-v3|.python310-compatibility-status.json|.final-python-compatibility-trigger)
                continue ;;
            esac
            if [ -f "$FINAL_TREE/$path" ]; then
              mkdir -p "$(dirname "$path")"
              cp "$FINAL_TREE/$path" "$path"
              printf '%s\n' "$path" >> /tmp/durable-paths.txt
            fi
          done
          if [ -s /tmp/durable-paths.txt ]; then
            while IFS= read -r path; do git add "$path"; done < /tmp/durable-paths.txt
            git commit -m 'Validate Python 3.10 and 3.13 release gates'
            git push origin HEAD:refs/heads/main
          fi
