name: Finalize TsaoSciComputation v4

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: finalize-v4-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  finalize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/finalize-v4'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out controlled release branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and extract ordinary source
        shell: bash
        run: |
          set -euo pipefail
          test "$(find .bootstrap -maxdepth 1 -type f -name 'source.part-*' | wc -l)" -eq 7
          cat .bootstrap/source.part-* > /tmp/TsaoSciComputation-v4.tar.xz
          echo '00aa1006dbef1bd72542ef73821f7496c20ba7558485a1098b407e35ad4003c8  /tmp/TsaoSciComputation-v4.tar.xz' | sha256sum --check --strict
          xz -dc /tmp/TsaoSciComputation-v4.tar.xz > /tmp/TsaoSciComputation-v4.tar
          rm -rf /tmp/ordinary-source
          mkdir -p /tmp/ordinary-source
          python - <<'PY'
          import tarfile
          from pathlib import Path, PurePosixPath

          archive = Path('/tmp/TsaoSciComputation-v4.tar')
          output = Path('/tmp/ordinary-source')
          max_files = 10_000
          max_member = 100 * 1024 * 1024
          max_total = 1024 * 1024 * 1024

          with tarfile.open(archive, 'r:') as stream:
              members = stream.getmembers()
              if not members or len(members) > max_files:
                  raise SystemExit(f'unsafe archive member count: {len(members)}')
              total = 0
              for member in members:
                  name = PurePosixPath(member.name)
                  if not member.name or name.is_absolute() or '..' in name.parts:
                      raise SystemExit(f'unsafe archive path: {member.name!r}')
                  if member.isdev() or member.isfifo() or member.issym() or member.islnk():
                      raise SystemExit(f'unsafe archive member: {member.name!r}')
                  if member.size < 0 or member.size > max_member:
                      raise SystemExit(f'unsafe archive member size: {member.name!r}')
                  total += member.size
                  if total > max_total:
                      raise SystemExit('archive expansion limit exceeded')
              stream.extractall(output, members=members, filter='data')
          PY
          test "$(cat /tmp/ordinary-source/VERSION)" = '4.0.0'
          test -f /tmp/ordinary-source/SKILL.md
          test -f /tmp/ordinary-source/pyproject.toml
          test -f /tmp/ordinary-source/.github/workflows/ci.yml
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/ordinary-source/. .

      - name: Validate ordinary source
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q tsao_computation scripts tests examples
          python scripts/run_tests.py --verbose
          python scripts/build_capability_index.py --check
          python scripts/build_manifest.py --check
          python scripts/audit_repository.py
          python scripts/benchmark.py
          rm -rf /tmp/tsao-release-a /tmp/tsao-release-b
          SOURCE_DATE_EPOCH=1700000000 python scripts/package_release.py --output /tmp/tsao-release-a/TsaoSciComputation-4.0.0
          SOURCE_DATE_EPOCH=1700000000 python scripts/package_release.py --output /tmp/tsao-release-b/TsaoSciComputation-4.0.0
          cmp /tmp/tsao-release-a/TsaoSciComputation-4.0.0.zip /tmp/tsao-release-b/TsaoSciComputation-4.0.0.zip
          sha256sum /tmp/tsao-release-a/TsaoSciComputation-4.0.0.zip

      - name: Commit ordinary source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'Ordinary source already present.'
            exit 0
          fi
          git commit -m 'Rebuild and optimize TsaoSciComputation v4.0.0'
          git push origin "HEAD:${{ github.head_ref }}"
