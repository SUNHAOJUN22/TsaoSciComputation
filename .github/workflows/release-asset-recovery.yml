name: Historical release asset recovery

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/audit-v1.0.2'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      summary: ${{ steps.select.outputs.summary }}
      selected_asset_id: ${{ steps.select.outputs.asset_id }}
      selected_asset_name: ${{ steps.select.outputs.asset_name }}
      workflow_artifact_id: ${{ steps.locate.outputs.workflow_artifact_id }}
    steps:
      - name: Query repository releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            > /tmp/releases.json

      - name: Select best source-bearing asset
        id: select
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import re
          from pathlib import Path

          releases = json.loads(Path('/tmp/releases.json').read_text(encoding='utf-8'))
          assets = []
          for release in releases:
              for asset in release.get('assets', []):
                  assets.append({
                      'tag': release.get('tag_name', ''),
                      'id': asset.get('id'),
                      'name': asset.get('name', ''),
                      'size': asset.get('size', 0),
                      'digest': asset.get('digest') or '',
                      'url': asset.get('url', ''),
                  })
          preferred_suffixes = ('.zip', '.tar.zst', '.tar.gz', '.tgz', '.whl')
          candidates = [asset for asset in assets if asset['name'].lower().endswith(preferred_suffixes)]
          candidates.sort(key=lambda item: (item['tag'], item['size']), reverse=True)
          selected = candidates[0] if candidates else None
          tags = ','.join(str(release.get('tag_name', '')) for release in releases[:8]) or 'none'
          tags = re.sub(r'[^A-Za-z0-9._,-]+', '_', tags)[:100]
          summary = f"R{len(releases)}-A{len(assets)}-C{len(candidates)}-T{tags}"
          print('summary=' + summary)
          if selected:
              print('asset_id=' + str(selected['id']))
              print('asset_name=' + selected['name'])
              Path('/tmp/selected.json').write_text(json.dumps(selected, indent=2, sort_keys=True) + '\n')
          else:
              print('asset_id=')
              print('asset_name=')
              Path('/tmp/selected.json').write_text('{}\n')
          Path('/tmp/release-inventory.json').write_text(json.dumps({'releases': releases, 'assets': assets}, indent=2, sort_keys=True) + '\n')
          PY

      - name: Download selected release asset
        if: steps.select.outputs.asset_id != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET_ID: ${{ steps.select.outputs.asset_id }}
          ASSET_NAME: ${{ steps.select.outputs.asset_name }}
        run: |
          set -euo pipefail
          mkdir -p recovered-release
          curl --fail --silent --show-error --location \
            -H 'Accept: application/octet-stream' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/assets/$ASSET_ID" \
            --output "recovered-release/$ASSET_NAME"
          cp /tmp/selected.json /tmp/release-inventory.json recovered-release/
          sha256sum "recovered-release/$ASSET_NAME" > recovered-release/SHA256SUMS
          test -s "recovered-release/$ASSET_NAME"
          case "$ASSET_NAME" in
            *.zip|*.whl) unzip -t "recovered-release/$ASSET_NAME" ;;
            *.tar.gz|*.tgz) gzip -t "recovered-release/$ASSET_NAME" ;;
            *.tar.zst) zstd --test "recovered-release/$ASSET_NAME" ;;
          esac

      - name: Upload validated historical release asset
        if: steps.select.outputs.asset_id != ''
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: TsaoSciComputation-historical-release-asset
          path: recovered-release
          if-no-files-found: error
          retention-days: 7

      - name: Locate workflow artifact ID
        id: locate
        if: steps.select.outputs.asset_id != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            curl --fail --silent --show-error --location \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts?per_page=100" \
              > /tmp/artifacts.json
            artifact_id=$(python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('/tmp/artifacts.json').read_text())
          matches = [item for item in data.get('artifacts', []) if item.get('name') == 'TsaoSciComputation-historical-release-asset']
          print(matches[0]['id'] if matches else '')
          PY
            )
            if [ -n "$artifact_id" ]; then
              echo "workflow_artifact_id=$artifact_id" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 2
          done
          echo 'workflow_artifact_id=' >> "$GITHUB_OUTPUT"

      - name: Upload release inventory when no asset exists
        if: steps.select.outputs.asset_id == ''
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: TsaoSciComputation-release-inventory-empty
          path: /tmp/release-inventory.json
          if-no-files-found: error
          retention-days: 7

  report:
    needs: inspect
    if: always()
    name: ${{ needs.inspect.outputs.summary }}-asset${{ needs.inspect.outputs.selected_asset_id }}-artifact${{ needs.inspect.outputs.workflow_artifact_id }}
    runs-on: ubuntu-latest
    steps:
      - run: echo 'Release recovery result encoded in job name.'
