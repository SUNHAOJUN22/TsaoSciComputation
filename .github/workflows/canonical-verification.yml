name: Canonical repository verification

on:
  push:
    branches: [main]
    paths: [.canonical-verification-trigger]

permissions:
  contents: write

concurrency:
  group: canonical-repository-verification
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      FINAL_TREE: /tmp/tsao-canonical-final-tree
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip
      - name: Verify the durable final tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          rm -rf "$FINAL_TREE"
          git worktree add --detach "$FINAL_TREE" HEAD
          cd "$FINAL_TREE"
          rm -f .github/workflows/canonical-verification.yml .canonical-verification-trigger

          mapfile -t branches < <(gh api --paginate "repos/$GITHUB_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u)
          test "${#branches[@]}" -eq 1
          test "${branches[0]}" = main

          python -m pip install -e '.[validation,quality]'
          python -m ruff format scripts/verify_all.py
          python scripts/verify_all.py --profile quality
          python scripts/build_manifest.py
          python scripts/verify_all.py --profile all
          python scripts/verify_all.py --profile benchmark

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ['FINAL_TREE'])
          report_path = root / 'reports/REMOTE_FINALIZATION.json'
          report = json.loads(report_path.read_text(encoding='utf-8'))
          security = json.loads((root / 'evidence/security-scan.json').read_text(encoding='utf-8'))
          report['security'] = {
              'files_scanned': security['files_scanned'],
              'findings': len(security['findings']),
          }
          report['canonical_verification'] = {
              'benchmark': 'VALIDATED',
              'entrypoint': 'python scripts/verify_all.py --profile all',
              'profiles': ['quality', 'core', 'package', 'benchmark'],
              'remote_branches': ['main'],
              'status': 'VALIDATED',
              'temporary_branch_created': False,
          }
          report_path.write_text(json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY

          python scripts/build_manifest.py
          python scripts/build_manifest.py --check

          cd "$GITHUB_WORKSPACE"
          : > /tmp/durable-paths.txt
          git -C "$FINAL_TREE" diff --name-only | while IFS= read -r path; do
            case "$path" in
              .github/workflows/canonical-verification.yml|.canonical-verification-trigger)
                continue
                ;;
            esac
            if [ -f "$FINAL_TREE/$path" ]; then
              mkdir -p "$(dirname "$path")"
              cp "$FINAL_TREE/$path" "$path"
              printf '%s\n' "$path" >> /tmp/durable-paths.txt
            fi
          done

          if [ -s /tmp/durable-paths.txt ]; then
            while IFS= read -r path; do git add "$path"; done < /tmp/durable-paths.txt
            git commit -m 'Validate canonical verification entrypoint and refresh evidence'
            git push origin HEAD:refs/heads/main
          fi
