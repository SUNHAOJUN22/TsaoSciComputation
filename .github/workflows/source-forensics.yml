name: Focused source archive forensics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  analyze-part002:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/tsao-source-forensics'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      summary: ${{ steps.repair.outputs.summary }}
      best_character: ${{ steps.repair.outputs.best_character }}
      candidate_count: ${{ steps.repair.outputs.candidate_count }}
      workflow_artifact_id: ${{ steps.locate.outputs.workflow_artifact_id }}
    steps:
      - name: Check out trusted base archive bytes
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Verify measured release chunk invariants
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          paths = sorted(Path('.release_source').glob('part-*'))
          if len(paths) != 16:
              raise SystemExit(f'expected 16 parts, got {len(paths)}')
          lengths = {p.name: len(''.join(p.read_text(encoding='ascii').split())) for p in paths}
          expected = {
              'part-000': 12000, 'part-001': 12000, 'part-002': 11999,
              'part-003': 12000, 'part-004': 12000, 'part-005': 12000,
              'part-006': 12000, 'part-007': 12000, 'part-008': 12000,
              'part-009': 12000, 'part-010': 12000, 'part-011': 12000,
              'part-012': 12000, 'part-013': 22867, 'part-014': 16195,
              'part-015': 7123,
          }
          if lengths != expected:
              raise SystemExit(f'release chunk layout changed: {lengths!r}')
          PY

      - name: Score all 64 end-character candidates for part 002
        id: repair
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p forensic-results
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import base64
          import ctypes
          import ctypes.util
          import json
          from pathlib import Path

          ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/'

          class InBuffer(ctypes.Structure):
              _fields_ = [('src', ctypes.c_void_p), ('size', ctypes.c_size_t), ('pos', ctypes.c_size_t)]

          class OutBuffer(ctypes.Structure):
              _fields_ = [('dst', ctypes.c_void_p), ('size', ctypes.c_size_t), ('pos', ctypes.c_size_t)]

          libname = ctypes.util.find_library('zstd')
          if not libname:
              raise SystemExit('system libzstd is unavailable')
          lib = ctypes.CDLL(libname)
          lib.ZSTD_createDStream.restype = ctypes.c_void_p
          lib.ZSTD_freeDStream.argtypes = [ctypes.c_void_p]
          lib.ZSTD_initDStream.argtypes = [ctypes.c_void_p]
          lib.ZSTD_initDStream.restype = ctypes.c_size_t
          lib.ZSTD_decompressStream.argtypes = [ctypes.c_void_p, ctypes.POINTER(OutBuffer), ctypes.POINTER(InBuffer)]
          lib.ZSTD_decompressStream.restype = ctypes.c_size_t
          lib.ZSTD_isError.argtypes = [ctypes.c_size_t]
          lib.ZSTD_isError.restype = ctypes.c_uint

          texts = {
              path.name: ''.join(path.read_text(encoding='ascii').split())
              for path in sorted(Path('.release_source').glob('part-*'))
          }

          def decode(text: str) -> bytes:
              remainder = len(text) % 4
              if remainder == 1:
                  raise ValueError('invalid Base64 length')
              return base64.b64decode(text + '=' * ((4 - remainder) % 4), validate=True)

          prefix = decode(texts['part-000']) + decode(texts['part-001'])
          middle = b''.join(decode(texts[f'part-{index:03d}']) for index in range(3, 13))

          def decompress_prefix(data: bytes):
              stream = lib.ZSTD_createDStream()
              if not stream:
                  raise RuntimeError('ZSTD_createDStream failed')
              try:
                  initialized = lib.ZSTD_initDStream(stream)
                  if lib.ZSTD_isError(initialized):
                      raise RuntimeError('ZSTD_initDStream failed')
                  source = ctypes.create_string_buffer(data)
                  inbuf = InBuffer(ctypes.cast(source, ctypes.c_void_p), len(data), 0)
                  output_chunks = []
                  total = 0
                  while inbuf.pos < inbuf.size:
                      destination = ctypes.create_string_buffer(131072)
                      outbuf = OutBuffer(ctypes.cast(destination, ctypes.c_void_p), len(destination), 0)
                      before = inbuf.pos
                      result = lib.ZSTD_decompressStream(stream, ctypes.byref(outbuf), ctypes.byref(inbuf))
                      if outbuf.pos:
                          output_chunks.append(destination.raw[:outbuf.pos])
                          total += outbuf.pos
                      if lib.ZSTD_isError(result):
                          return False, int(inbuf.pos), total, b''.join(output_chunks)
                      if inbuf.pos == before and outbuf.pos == 0:
                          return False, int(inbuf.pos), total, b''.join(output_chunks)
                  return True, int(inbuf.pos), total, b''.join(output_chunks)
              finally:
                  lib.ZSTD_freeDStream(stream)

          def tar_score(data: bytes):
              offset = 0
              headers = 0
              while offset + 512 <= len(data):
                  block = data[offset:offset + 512]
                  if block == b'\0' * 512:
                      return headers, offset + 512
                  try:
                      expected = int(block[148:156].rstrip(b'\0 ').strip() or b'0', 8)
                      size = int(block[124:136].rstrip(b'\0 ').strip() or b'0', 8)
                  except ValueError:
                      break
                  checksum = sum(block[:148]) + 32 * 8 + sum(block[156:])
                  if checksum != expected:
                      break
                  next_offset = offset + 512 + ((size + 511) // 512) * 512
                  headers += 1
                  if next_offset > len(data):
                      return headers, offset + 512
                  offset = next_offset
              return headers, offset

          records = []
          for character in ALPHABET:
              candidate = decode(texts['part-002'] + character)
              valid, consumed, output_size, output = decompress_prefix(prefix + candidate + middle)
              headers, tar_bytes = tar_score(output)
              records.append({
                  'character': character,
                  'stream_valid': valid,
                  'input_consumed': consumed,
                  'output_size': output_size,
                  'tar_headers': headers,
                  'tar_bytes': tar_bytes,
              })

          score_fields = ('stream_valid', 'tar_headers', 'tar_bytes', 'output_size', 'input_consumed')
          records.sort(key=lambda item: tuple(item[field] for field in score_fields), reverse=True)
          best_score = tuple(records[0][field] for field in score_fields)
          best = [item for item in records if tuple(item[field] for field in score_fields) == best_score]
          compact = ';'.join(
              f"{item['character']}_{int(item['stream_valid'])}_{item['tar_headers']}_{item['tar_bytes']}_{item['output_size']}_{item['input_consumed']}"
              for item in best[:8]
          )
          summary = f"N{len(best)}-{compact}"
          print('summary=' + summary)
          print('candidate_count=' + str(len(best)))
          print('best_character=' + (best[0]['character'] if len(best) == 1 else ''))
          Path('forensic-results/part002-analysis.json').write_text(
              json.dumps({'best': best, 'all': records}, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY

      - name: Upload forensic result
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: TsaoSciComputation-focused-forensics
          path: forensic-results
          if-no-files-found: error
          retention-days: 7

      - name: Locate forensic artifact ID
        id: locate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            curl --fail --silent --show-error --location \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts?per_page=100" \
              > /tmp/artifacts.json
            artifact_id=$(python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('/tmp/artifacts.json').read_text(encoding='utf-8'))
          matches = [item for item in data.get('artifacts', []) if item.get('name') == 'TsaoSciComputation-focused-forensics']
          print(matches[0]['id'] if matches else '')
          PY
            )
            if [ -n "$artifact_id" ]; then
              echo "workflow_artifact_id=$artifact_id" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 2
          done
          echo 'workflow_artifact_id=' >> "$GITHUB_OUTPUT"

  report:
    needs: analyze-part002
    if: always()
    name: part002-${{ needs.analyze-part002.outputs.summary }}-artifact${{ needs.analyze-part002.outputs.workflow_artifact_id }}
    runs-on: ubuntu-latest
    steps:
      - run: echo 'Focused forensic result encoded in job name.'
