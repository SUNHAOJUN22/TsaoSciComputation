name: Export audit snapshot

on:
  push:
    branches:
      - agent/audit-v1.0.2

permissions:
  contents: read

concurrency:
  group: export-audit-snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out audit branch with full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build auditable snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p export
          git for-each-ref --format='%(refname) %(objectname)' refs/remotes refs/tags > export/refs.txt
          git log --all --graph --decorate --oneline --date-order > export/history.txt
          find . -path './.git' -prune -o -type f -printf '%P\t%s\n' | LC_ALL=C sort > export/files.tsv
          tar --exclude=.git --exclude=export -czf export/repository-snapshot.tar.gz .
          sha256sum export/repository-snapshot.tar.gz > export/SHA256SUMS

      - name: Upload audit snapshot
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: TsaoSciComputation-audit-snapshot
          path: export
          if-no-files-found: error
          retention-days: 7
