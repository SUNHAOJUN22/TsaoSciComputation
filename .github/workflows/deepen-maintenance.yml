name: Deepen v3.0.2 maintenance governance

on:
  push:
    branches: [main]
    paths: [.deepen-maintenance]

permissions:
  contents: write
  actions: write

concurrency:
  group: deepen-maintenance-main
  cancel-in-progress: true

jobs:
  deepen:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Configure repository
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip

      - name: Apply governance and dependency-maintenance upgrade
        shell: bash
        run: |
          set -Eeuo pipefail
          STAGE=initialization
          exec > >(tee /tmp/deepen-maintenance.log) 2>&1
          record_failure() {
            code=$?
            set +e
            export STAGE code
            python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          log = Path('/tmp/deepen-maintenance.log')
          tail = '\n'.join(log.read_text(encoding='utf-8', errors='replace').splitlines()[-240:]) if log.exists() else ''
          payload = {
              'schema_version': '1.0',
              'status': 'FAILED',
              'stage': os.environ['STAGE'],
              'exit_code': int(os.environ['code']),
              'branch': 'main',
              'temporary_branch_created': False,
              'failed_at_utc': datetime.now(timezone.utc).isoformat(),
              'log_tail': tail,
          }
          path = Path('reports/MAINTENANCE_GOVERNANCE_FAILURE.json')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
            git add reports/MAINTENANCE_GOVERNANCE_FAILURE.json
            git commit -m "Record maintenance governance failure at ${STAGE}" || true
            git push origin HEAD:refs/heads/main || true
            exit "$code"
          }
          trap record_failure ERR

          STAGE=bootstrap-dependencies
          python -m pip install -e '.[validation,quality]'

          STAGE=write-governance
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          (root / 'VERSION').write_text('3.0.2\n', encoding='utf-8')

          pyproject = (root / 'pyproject.toml').read_text(encoding='utf-8')
          if 'security = [' not in pyproject:
              match = re.search(r'(?ms)^quality = \[.*?^\]\n', pyproject)
              if match is None:
                  raise SystemExit('quality dependency block not found')
              security = 'security = [\n  "pip-audit==2.10.0",\n]\n'
              pyproject = pyproject[:match.end()] + security + pyproject[match.end():]
          (root / 'pyproject.toml').write_text(pyproject, encoding='utf-8')

          changelog = (root / 'CHANGELOG.md').read_text(encoding='utf-8')
          marker = '## Unreleased\n\nNo unreleased changes.\n'
          release = '''## Unreleased

No unreleased changes.

## 3.0.2 — 2026-07-24

- Added a branchless weekly dependency-vulnerability audit using a pinned `pip-audit` toolchain and read-only GitHub permissions.
- Added CODEOWNERS for security-sensitive, release, workflow, contract, adapter, and validation paths.
- Added structured software-defect, scientific-validity, and capability-request issue forms with explicit security and data-handling boundaries.
- Added support, conduct, and dependency-maintenance policies aligned with the canonical single-`main` upstream model.
- Added regression tests that prevent branch-creating dependency automation, unpinned maintenance Actions, blank public issues, and unsafe security-report routing.
'''
          if marker not in changelog:
              raise SystemExit('Unreleased changelog marker not found')
          (root / 'CHANGELOG.md').write_text(changelog.replace(marker, release, 1), encoding='utf-8')

          files = {
              '.github/CODEOWNERS': '''# Canonical ownership for the single-main upstream repository.
* @SUNHAOJUN22
/.github/ @SUNHAOJUN22
/SECURITY.md @SUNHAOJUN22
/CONTRIBUTING.md @SUNHAOJUN22
/CODE_OF_CONDUCT.md @SUNHAOJUN22
/SUPPORT.md @SUNHAOJUN22
/scripts/ @SUNHAOJUN22
/schemas/ @SUNHAOJUN22
/tsao_computation/contracts/ @SUNHAOJUN22
/tsao_computation/security/ @SUNHAOJUN22
/tsao_computation/state/ @SUNHAOJUN22
/tsao_computation/validation/ @SUNHAOJUN22
/adapters/ @SUNHAOJUN22
/capability-index/ @SUNHAOJUN22
/docs/releases/ @SUNHAOJUN22
''',
              '.github/ISSUE_TEMPLATE/config.yml': '''blank_issues_enabled: false
contact_links:
  - name: Security reporting instructions
    url: https://github.com/SUNHAOJUN22/TsaoSciComputation/security/policy
    about: Do not disclose vulnerabilities, credentials, licenses, proprietary data, or production-control details in a public issue.
  - name: Release verification
    url: https://github.com/SUNHAOJUN22/TsaoSciComputation/blob/main/docs/release.md
    about: Verify checksums, SBOMs, Manifests, and GitHub/Sigstore attestations before reporting a release-integrity problem.
''',
