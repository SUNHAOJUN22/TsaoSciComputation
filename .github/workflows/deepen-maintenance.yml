              'SUPPORT.md': '''# Support

## Start with the verified paths

Use the README, `docs/coverage-matrix.md`, `docs/scientific-trust.md`, and `docs/release.md` before opening an issue. Run the canonical verification command when reporting repository behavior:

```bash
python -m pip install -e '.[validation,quality]'
python scripts/verify_all.py --profile all
```

## Public issue routing

Use the structured issue forms for reproducible software defects, scientific-validity concerns, and bounded capability requests. Blank public issues are disabled so that reports include version, evidence, assumptions, and claim boundaries.

Do not use public issues for vulnerabilities, credentials, license files, private datasets, proprietary solver inputs, or production DCS/SIS information. Follow `SECURITY.md` instead.

## Support boundary

Support covers repository orchestration, contracts, routing, deterministic fixtures, parsers, validation controls, packaging, and release evidence. It does not provide third-party solver licenses, production HPC administration, plant-control authorization, or certification of user-supplied scientific models and data.
''',
              'CODE_OF_CONDUCT.md': '''# Code of Conduct

TsaoSciComputation discussions must remain professional, evidence-based, and safe.

Participants must:

- discuss ideas, code, evidence, and scientific assumptions rather than attacking people;
- distinguish software correctness from scientific validity and clearly state uncertainty and applicability limits;
- protect credentials, licenses, proprietary data, private datasets, and production-control information;
- avoid fabricated evidence, misleading solver claims, harassment, discrimination, intimidation, and disruptive behavior;
- stop and escalate when work touches safety systems, runaway hazards, regulated data, or decisions requiring qualified domain review.

Maintainers may edit, hide, lock, or remove content and restrict participation when necessary to protect people, data, repository integrity, or scientific trust. Security concerns must follow `SECURITY.md`; ordinary conduct concerns may be raised privately through a non-public contact route on the repository owner's GitHub profile.
''',
              'docs/dependency-maintenance.md': '''# Dependency maintenance

## Why the upstream repository does not use Dependabot version-update pull requests

The canonical upstream repository intentionally retains only `main`. Automated version-update pull requests necessarily create update branches, so upstream dependency maintenance uses a branchless scheduled audit instead. External contributors may still use branches in their own forks.

## Weekly audit

`.github/workflows/dependency-audit.yml` installs the declared validation, quality, and security dependency groups in an isolated GitHub-hosted Python 3.13 environment and runs the pinned `pip-audit` toolchain. It has read-only repository permissions, never changes source, never opens a branch, and uploads both the JSON vulnerability report and the resolved environment snapshot.

A failed audit is an investigation signal, not permission to blindly upgrade. Review the advisory, exploitability, affected execution path, fixed versions, upstream release notes, and compatibility before updating constraints or minimum versions on `main`.

## Update procedure

1. Review the scheduled audit artifact and upstream advisories.
2. Change only the necessary dependency declarations on `main`.
3. Run `python scripts/verify_all.py --profile all` and the branchless dependency audit.
4. Preserve fail-closed tests and scientific claim boundaries.
5. Record the decision in `CHANGELOG.md`; issue a patch release when user-visible or security-relevant behavior changes.

`pip-audit` detects known Python-package vulnerabilities; it is not a static analyzer, malicious-package detector, solver validator, or substitute for CodeQL, Bandit, repository security invariants, SBOMs, provenance attestations, and qualified scientific review.
''',
              '.github/workflows/dependency-audit.yml': '''name: Dependency audit

on:
  workflow_dispatch:
  schedule:
    - cron: '37 4 * * 2'

permissions:
  contents: read

concurrency:
  group: dependency-audit-main
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip
      - name: Install the declared audit environment
        run: python -m pip install -e '.[validation,quality,security]'
      - name: Record the resolved environment
        run: |
          mkdir -p reports
          python -m pip freeze --all > reports/DEPENDENCY_SNAPSHOT.txt
      - name: Audit known Python-package vulnerabilities
        run: >-
          python -m pip_audit --local --skip-editable --progress-spinner=off
          --format=json --output reports/DEPENDENCY_AUDIT.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: ${{ always() }}
        with:
          name: dependency-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            reports/DEPENDENCY_AUDIT.json
            reports/DEPENDENCY_SNAPSHOT.txt
          if-no-files-found: warn
          retention-days: 30
''',
              'tests/test_maintenance_governance.py': '''from __future__ import annotations

import re
from pathlib import Path

ROOT = Path(__file__).resolve().parents[1]


def test_codeowners_protects_high_trust_paths() -> None:
    owners = (ROOT / ".github" / "CODEOWNERS").read_text(encoding="utf-8")
    for path in (
        "/.github/",
        "/SECURITY.md",
        "/scripts/",
        "/schemas/",
        "/tsao_computation/contracts/",
        "/tsao_computation/security/",
        "/tsao_computation/state/",
        "/tsao_computation/validation/",
        "/adapters/",
    ):
        assert path in owners
    assert "@SUNHAOJUN22" in owners


def test_issue_forms_are_structured_and_security_safe() -> None:
    issue_root = ROOT / ".github" / "ISSUE_TEMPLATE"
    config = (issue_root / "config.yml").read_text(encoding="utf-8")
    assert "blank_issues_enabled: false" in config
    assert "/security/policy" in config
    for filename in ("bug.yml", "scientific-validity.yml", "capability-request.yml"):
        text = (issue_root / filename).read_text(encoding="utf-8")
        assert "validations:" in text
        assert "required: true" in text
    bug = (issue_root / "bug.yml").read_text(encoding="utf-8")
    assert "This is not a privately reportable security vulnerability" in bug
    scientific = (issue_root / "scientific-validity.yml").read_text(encoding="utf-8")
    assert "uncertainty" in scientific.lower()
    assert "qualified domain review" in scientific


def test_dependency_audit_is_branchless_read_only_and_pinned() -> None:
    workflow = (ROOT / ".github" / "workflows" / "dependency-audit.yml").read_text(
        encoding="utf-8"
    )
    assert "schedule:" in workflow
    assert "contents: read" in workflow
    assert "contents: write" not in workflow
    assert "pull-requests: write" not in workflow
    assert "pip_audit" in workflow
    assert "--skip-editable" in workflow
    assert "DEPENDENCY_AUDIT.json" in workflow
    assert "github.run_id" in workflow and "github.run_attempt" in workflow
    pattern = re.compile(r"uses:\s+[^@\s]+@([0-9a-f]{40})$")
    uses = [line.strip() for line in workflow.splitlines() if "uses:" in line]
    assert uses and all(pattern.search(line) for line in uses), uses


def test_single_main_policy_does_not_enable_branch_creating_dependabot() -> None:
    assert not (ROOT / ".github" / "dependabot.yml").exists()
    assert not (ROOT / ".github" / "dependabot.yaml").exists()
    policy = (ROOT / "docs" / "dependency-maintenance.md").read_text(encoding="utf-8")
    assert "branchless scheduled audit" in policy
    assert "only `main`" in policy


def test_support_and_conduct_boundaries_are_present() -> None:
    support = (ROOT / "SUPPORT.md").read_text(encoding="utf-8")
    conduct = (ROOT / "CODE_OF_CONDUCT.md").read_text(encoding="utf-8")
    assert "structured issue forms" in support
    assert "SECURITY.md" in support
    assert "scientific validity" in conduct
    assert "production-control" in conduct
''',
              'docs/releases/v3.0.2.md': '''# TsaoSciComputation v3.0.2

This maintenance release deepens long-term repository governance without creating upstream feature branches.

## Highlights

- Adds a pinned, branchless weekly dependency-vulnerability audit with read-only permissions and retained JSON evidence.
- Adds CODEOWNERS coverage for security-sensitive, release, contract, adapter, state, and validation paths.
- Adds structured software-defect, scientific-validity, and capability-request issue forms while disabling unsafe blank issues.
- Adds support, conduct, and dependency-maintenance policies aligned with the single-`main` upstream model.
- Adds regression tests for ownership, issue routing, pinned maintenance Actions, dependency-audit permissions, and the absence of branch-creating Dependabot configuration.

## Verification

The release is accepted only after Python 3.10 core gates, Python 3.13 deterministic release gates, dependency audit, benchmark telemetry, Skill installation roundtrip, single-main verification, reproducible source and Wheel builds, SBOM generation, release checksums, and GitHub/Sigstore attestations.

## Trust boundary

The dependency audit detects known Python-package vulnerabilities. It does not certify third-party solvers, scientific models, commercial licenses, production HPC systems, plant controls, or user-supplied data.
''',
