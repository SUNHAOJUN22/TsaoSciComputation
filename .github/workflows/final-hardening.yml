name: Final fail-closed hardening

on:
  push:
    branches: [main]
    paths: [.final-hardening-trigger]

permissions:
  contents: write

concurrency:
  group: final-fail-closed-hardening
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      FINAL_TREE: /tmp/tsao-final-hardening
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'
          cache: pip
      - name: Validate durable tree on Python 3.10
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          STAGE=initialization
          record_failure() {
            cd "$GITHUB_WORKSPACE"
            printf '{\n  "outcome": "failure",\n  "schema_version": "1.0",\n  "stage": "%s"\n}\n' "$STAGE" > .final-hardening-status.json
            git add .final-hardening-status.json
            git commit -m "Record final hardening failure at $STAGE" || true
            git push origin HEAD:refs/heads/main || true
          }
          trap record_failure ERR

          STAGE=prepare-durable-tree
          rm -rf "$FINAL_TREE"
          git worktree add --detach "$FINAL_TREE" HEAD
          cd "$FINAL_TREE"
          find .github/workflows -maxdepth 1 -type f \
            ! -name ci.yml ! -name codeql.yml ! -name release.yml -delete
          find . -maxdepth 1 -type f -name '.*trigger*' -delete
          find . -maxdepth 1 -type f -name '.*status.json' -delete

          STAGE=apply-source-migrations
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/install_skill.py')
          text = path.read_text(encoding='utf-8')
          start = text.index('def uninstall_skill(')
          end = text.index('\n\ndef build_parser()', start)
          replacement = '''def uninstall_skill(
              destination: Path, *, force: bool = False, dry_run: bool = False
          ) -> None:
              if not destination.exists():
                  raise FileNotFoundError(f"installation not found: {destination}")
              if not force:
                  problems = validate_installation(destination)
                  if problems:
                      raise ValueError(
                          "refusing to remove an invalid installation; "
                          f"use --force: {problems}"
                      )
              if dry_run:
                  print(f"DRY-RUN uninstall {destination}")
                  return
              shutil.rmtree(destination)
          '''
          path.write_text(text[:start] + replacement + text[end:], encoding='utf-8')

          path = Path('tests/test_core.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '"a", "b", "q", 1, "1", {}, "r", 0, 0, "d", "identity", "validated"',
              '"a", "b", "q", 1, "1", {"temperature_K": 298}, "r", 0, 0, "d", "identity", "validated"',
          )
          text = text.replace(
              'HandoffRecord("a", "b", "q", 1, "1", {}, "r", 0, 0, "d", "identity", "accepted")',
              'HandoffRecord("a", "b", "q", 1, "1", {"temperature_K": 298}, "r", 0, 0, "d", "identity", "accepted")',
          )
          old = '''    for s in (
                  "planned",
                  "prepared",
                  "submitted",
                  "running",
                  "completed",
                  "parsed",
                  "converged",
                  "validated",
                  "accepted",
              ):
                  m.transition(s, evidence=s)
              assert m.state == "accepted" and len(m.events) == 9'''
          new = '''    for s in (
                  "specified",
                  "prepared",
                  "preflight-passed",
                  "submitted",
                  "running",
                  "completed",
                  "parsed",
                  "numerically-converged",
                  "physically-validated",
                  "scientifically-accepted",
              ):
                  m.transition(s, evidence=s)
              assert m.state == "scientifically-accepted" and len(m.events) == 10'''
          if old not in text:
              raise SystemExit('state happy-path test anchor not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

          STAGE=python310-dependencies
          python -m pip install -e '.[validation,quality]'
          STAGE=generate-durable-artifacts
          python scripts/sync_package_assets.py
          python scripts/build_adapter_docs.py
          python scripts/build_workflow_docs.py
          python scripts/build_examples.py
          python -m ruff check --fix tsao_computation scripts tests
          python -m ruff format tsao_computation scripts tests
          python scripts/build_manifest.py
          STAGE=python310-release-gates
          python scripts/verify_all.py --profile all
          printf 'success\n' > /tmp/tsao-python310-success
          trap - ERR
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip
      - name: Validate Python 3.13, refresh evidence, and publish
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          STAGE=python313-initialization
          record_failure() {
            cd "$GITHUB_WORKSPACE"
            printf '{\n  "outcome": "failure",\n  "schema_version": "1.0",\n  "stage": "%s"\n}\n' "$STAGE" > .final-hardening-status.json
            git add .final-hardening-status.json
            git commit -m "Record final hardening failure at $STAGE" || true
            git push origin HEAD:refs/heads/main || true
          }
          trap record_failure ERR
          test -f /tmp/tsao-python310-success
          cd "$FINAL_TREE"

          STAGE=python313-dependencies
          python -m pip install -e '.[validation,quality]'
          STAGE=python313-release-gates
          python scripts/verify_all.py --profile all
          STAGE=benchmark
          python scripts/verify_all.py --profile benchmark
          python -m coverage json -o /tmp/tsao-final-coverage.json

          STAGE=installation-roundtrip
          rm -rf /tmp/TsaoSciComputation
          python scripts/install_skill.py --agent codex --scope project \
            --target /tmp/TsaoSciComputation --force
          python scripts/install_skill.py --agent codex --scope project \
            --target /tmp/TsaoSciComputation --validate
          python scripts/install_skill.py --agent codex --scope project \
            --target /tmp/TsaoSciComputation --uninstall

          STAGE=single-main-check
          mapfile -t branches < <(gh api --paginate \
            "repos/$GITHUB_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u)
          test "${#branches[@]}" -eq 1
          test "${branches[0]}" = main

          STAGE=refresh-evidence
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          root = Path(os.environ['FINAL_TREE'])
          collection = subprocess.run(
              [sys.executable, '-m', 'pytest', '--collect-only', '-q'],
              cwd=root,
              check=True,
              capture_output=True,
              text=True,
          )
          match = re.search(r'(\d+) tests? collected', collection.stdout + collection.stderr)
          if match is None:
              raise SystemExit('unable to determine test count')
          tests = int(match.group(1))
          coverage = json.loads(Path('/tmp/tsao-final-coverage.json').read_text(encoding='utf-8'))['totals']
          statement = 100.0 * (coverage['num_statements'] - coverage['missing_lines']) / coverage['num_statements']
          branch = 100.0 * (coverage['num_branches'] - coverage['missing_branches']) / coverage['num_branches']
          security = json.loads((root / 'evidence/security-scan.json').read_text(encoding='utf-8'))

          baseline_path = root / 'evidence/quality-baseline.json'
          baseline = json.loads(baseline_path.read_text(encoding='utf-8'))
          baseline['counts']['tests_passed'] = tests
          baseline['counts']['tests_failed'] = 0
          baseline['coverage'] = {
              'branches_percent': branch,
              'missing_branches': coverage['missing_branches'],
              'missing_statements': coverage['missing_lines'],
              'statements_percent': statement,
          }
          baseline['security']['repository_findings'] = len(security['findings'])
          baseline_path.write_text(json.dumps(baseline, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          report_path = root / 'reports/REMOTE_FINALIZATION.json'
          report = json.loads(report_path.read_text(encoding='utf-8'))
          report['tests'] = {'errors': 0, 'failures': 0, 'passed': tests}
          report['coverage'] = {
              'covered_branches': coverage['covered_branches'],
              'covered_lines': coverage['covered_lines'],
              'excluded_lines': coverage['excluded_lines'],
              'missing_branches': coverage['missing_branches'],
              'missing_lines': coverage['missing_lines'],
              'num_branches': coverage['num_branches'],
              'num_partial_branches': coverage['num_partial_branches'],
              'num_statements': coverage['num_statements'],
              'percent_branches_covered': branch,
              'percent_branches_covered_display': f'{branch:.0f}',
              'percent_covered': coverage['percent_covered'],
              'percent_covered_display': coverage['percent_covered_display'],
              'percent_statements_covered': statement,
              'percent_statements_covered_display': f'{statement:.0f}',
          }
          report['security'] = {
              'files_scanned': security['files_scanned'],
              'findings': len(security['findings']),
          }
          report['requirements_traceability'] = {
              'adapter_document_standard': '27/27',
              'adapter_module_probes': 'VALIDATED_FAIL_CLOSED',
              'adapter_parser_boundary': 'NORMAL_EXIT_NOT_CONVERGENCE',
              'calculation_contract': 'STRICT_PREFLIGHT',
              'catalog_computational_subset': 164,
              'direct_or_combined_adapters': 27,
              'installation_manifest_validation': 'VALIDATED',
              'malformed_contract_handling': 'VALIDATED_FAIL_CLOSED',
              'root_intake_questions': 12,
              'scientific_engine_shortlist': 32,
              'scientific_state_chain': 'VALIDATED',
              'strict_multiscale_handoff': 'VALIDATED',
              'strict_scenario_examples': 12,
              'workflow_document_standard': '20/20',
          }
          report['hardening'] = {
              'benchmark': 'VALIDATED_SEPARATELY',
              'full_manifest_install_roundtrip': 'VALIDATED',
              'python_310_release_gates': 'VALIDATED',
              'python_313_release_gates': 'VALIDATED',
              'remote_branches': ['main'],
              'status': 'VALIDATED',
              'temporary_branch_created': False,
          }
          report_path.write_text(json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          updates = (
              (
                  'README.md',
                  r'\| Tests \| \d+ passed, \d+ failed \|',
                  r'\| Statement / branch coverage \| [^|]+ \|',
                  f'| Tests | {tests} passed, 0 failed |',
                  f'| Statement / branch coverage | {statement:.2f}% / {branch:.2f}% |',
                  'Adapter discovery requires every declared executable and Python module; normal exit is not convergence. Installed copies are checked against the full SHA-256 manifest, and all 12 scenario contracts pass strict preflight validation.',
                  '## Scientific trust boundary',
              ),
              (
                  'README.zh-CN.md',
                  r'\| 自动测试 \| \d+ 通过，\d+ 失败 \|',
                  r'\| 语句 / 分支覆盖率 \| [^|]+ \|',
                  f'| 自动测试 | {tests} 通过，0 失败 |',
                  f'| 语句 / 分支覆盖率 | {statement:.2f}% / {branch:.2f}% |',
                  '适配器只有在全部声明的可执行程序和 Python 模块均通过探测后才可标记为可用；正常退出不等于数值收敛。安装副本按完整 SHA-256 Manifest 校验，12 类场景合同均通过严格前检。',
                  '## 科学可信边界',
              ),
          )
          for filename, test_pattern, coverage_pattern, test_text, coverage_text, note, marker in updates:
              path = root / filename
              text = path.read_text(encoding='utf-8')
              text = re.sub(test_pattern, test_text, text)
              text = re.sub(coverage_pattern, coverage_text, text)
              if note not in text:
                  text = text.replace(marker, note + '\n\n' + marker, 1)
              path.write_text(text, encoding='utf-8')
          PY

          STAGE=final-manifest-and-core
          python scripts/build_manifest.py
          python scripts/build_manifest.py --check
          python scripts/verify_all.py --profile core

          STAGE=publish-non-workflow-results
          cd "$GITHUB_WORKSPACE"
          git -C "$FINAL_TREE" diff --name-only -z | while IFS= read -r -d '' path; do
            case "$path" in
              .github/workflows/*)
                continue
                ;;
            esac
            if [ -f "$FINAL_TREE/$path" ]; then
              mkdir -p "$(dirname "$path")"
              cp "$FINAL_TREE/$path" "$path"
              git add "$path"
            else
              git rm -f --ignore-unmatch "$path"
            fi
          done
          rm -f .final-hardening-status.json
          git add -u
          git commit -m 'Complete fail-closed repository hardening and refresh evidence'
          git push origin HEAD:refs/heads/main
          trap - ERR
