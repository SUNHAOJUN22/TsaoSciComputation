name: Read-only source recovery artifact

on:
  pull_request_target:
    types: [synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: readonly-source-recovery-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  recover:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/audit-v1.0.2'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out trusted base commit only
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1

      - name: Verify and safely recover fixed archives
        shell: bash
        run: |
          set -euo pipefail
          test "$(find .audit_source_v101 -maxdepth 1 -type f -name 'part-*' | wc -l)" -eq 19
          test "$(find .audit_patch_v102 -maxdepth 1 -type f -name 'part-*' | wc -l)" -eq 43
          cat .audit_source_v101/part-* | base64 --decode > /tmp/baseline.tar.zst
          echo '4862f93186404e12b4a04d2a8cbcfbd037141ea503524208f4b2143e4bdaf73a  /tmp/baseline.tar.zst' | sha256sum --check --strict
          cat .audit_patch_v102/part-* | base64 --decode > /tmp/patch.tar.zst
          echo '7db7cc18b55077a605009d9b16a65d21c19e37e539eb6c567577eb4fdebac63a  /tmp/patch.tar.zst' | sha256sum --check --strict
          zstd -dc /tmp/baseline.tar.zst > /tmp/baseline.tar
          zstd -dc /tmp/patch.tar.zst > /tmp/patch.tar
          python - <<'PY'
          import json
          import shutil
          import tarfile
          from pathlib import Path, PurePosixPath

          MAX_FILES = 10000
          MAX_MEMBER = 100 * 1024 * 1024
          MAX_TOTAL = 1024 * 1024 * 1024

          def safe_extract(archive: Path, output: Path):
              output.mkdir(parents=True, exist_ok=True)
              with tarfile.open(archive, 'r:') as tf:
                  members = tf.getmembers()
                  if len(members) > MAX_FILES:
                      raise SystemExit('archive contains too many members')
                  total = 0
                  for member in members:
                      name = PurePosixPath(member.name)
                      if not member.name or name.is_absolute() or '..' in name.parts:
                          raise SystemExit(f'unsafe archive path: {member.name!r}')
                      if member.isdev() or member.isfifo():
                          raise SystemExit(f'unsafe special file: {member.name!r}')
                      if member.size < 0 or member.size > MAX_MEMBER:
                          raise SystemExit(f'unsafe member size: {member.name!r}')
                      total += member.size
                      if total > MAX_TOTAL:
                          raise SystemExit('archive expansion limit exceeded')
                      if member.issym() or member.islnk():
                          link = PurePosixPath(member.linkname)
                          target = name.parent / link
                          if link.is_absolute() or '..' in target.parts:
                              raise SystemExit(f'unsafe archive link: {member.name!r}')
                  tf.extractall(output, members=members, filter='data')
              return {'members': len(members), 'expanded_bytes': total}

          baseline_stats = safe_extract(Path('/tmp/baseline.tar'), Path('/tmp/unpacked'))
          patch_stats = safe_extract(Path('/tmp/patch.tar'), Path('/tmp/patch'))
          root = (Path('/tmp/unpacked') / 'TsaoSciComputation').resolve()
          if not (root / 'SKILL.md').is_file() or (root / 'VERSION').read_text().strip() != '1.0.1':
              raise SystemExit('invalid baseline source')

          files = Path('/tmp/patch/v102-patch/files')
          for source in sorted(files.rglob('*')):
              relative = source.relative_to(files)
              target = (root / relative).resolve(strict=False)
              if target != root and root not in target.parents:
                  raise SystemExit(f'unsafe patch target: {relative}')
              if source.is_symlink():
                  raise SystemExit(f'patch symlink rejected: {relative}')
              if source.is_dir():
                  target.mkdir(parents=True, exist_ok=True)
              elif source.is_file():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(source, target)

          deleted = json.loads(Path('/tmp/patch/v102-patch/deleted.json').read_text(encoding='utf-8'))
          for relative in deleted:
              target = (root / relative).resolve(strict=False)
              if target == root or root not in target.parents:
                  raise SystemExit(f'unsafe deletion: {relative}')
              if target.is_symlink() or target.is_file():
                  target.unlink()
              elif target.is_dir():
                  shutil.rmtree(target)

          required = ['SKILL.md', 'README.md', 'README.zh-CN.md', 'VERSION', 'LICENSE', 'THIRD_PARTY.md', 'pyproject.toml']
          missing = [item for item in required if not (root / item).is_file()]
          if missing or (root / 'VERSION').read_text().strip() != '1.0.2':
              raise SystemExit(f'invalid recovered source; missing={missing}')
          manifest = {
              'version': '1.0.2',
              'baseline_sha256': '4862f93186404e12b4a04d2a8cbcfbd037141ea503524208f4b2143e4bdaf73a',
              'patch_sha256': '7db7cc18b55077a605009d9b16a65d21c19e37e539eb6c567577eb4fdebac63a',
              'baseline': baseline_stats,
              'patch': patch_stats,
              'claim_boundary': 'source recovery only; no scientific solver execution',
          }
          (root / 'SOURCE_RECOVERY_MANIFEST.json').write_text(json.dumps(manifest, indent=2, sort_keys=True) + '\n')
          PY
          python -m compileall -q /tmp/unpacked/TsaoSciComputation/tsao_computation /tmp/unpacked/TsaoSciComputation/scripts /tmp/unpacked/TsaoSciComputation/tests /tmp/unpacked/TsaoSciComputation/examples
          mkdir -p recovered
          cp -a /tmp/unpacked/TsaoSciComputation recovered/
          find recovered/TsaoSciComputation -type f -print0 | sort -z | xargs -0 sha256sum > recovered/SHA256SUMS

      - name: Upload recovered source artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: TsaoSciComputation-v1.0.2-recovered-source
          path: recovered
          if-no-files-found: error
          retention-days: 7
