name: Force single-main cleanup

on:
  push:
    branches: [main]
    paths: [.force-single-main-trigger]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: force-single-main-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true

      - name: Close pull requests and delete every non-main branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          mapfile -t open_prs < <(gh api --paginate "repos/$REPOSITORY/pulls?state=open&per_page=100" --jq '.[].number' | sort -n -u)
          for number in "${open_prs[@]}"; do
            [ -n "$number" ] || continue
            gh api -X PATCH "repos/$REPOSITORY/pulls/$number" -f state=closed >/dev/null
          done

          mapfile -t before < <(gh api --paginate "repos/$REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u)
          printf '%s\n' "${before[@]}" > /tmp/branches-before.txt
          deleted=()
          for branch in "${before[@]}"; do
            [ "$branch" = main ] && continue
            git push origin --delete "$branch"
            deleted+=("$branch")
          done

          mapfile -t after < <(gh api --paginate "repos/$REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u)
          printf '%s\n' "${after[@]}" > /tmp/branches-after.txt
          test "${#after[@]}" -eq 1
          test "${after[0]}" = main

          python - <<'PY'
          import json
          from pathlib import Path
          before=[x for x in Path('/tmp/branches-before.txt').read_text().splitlines() if x]
          after=[x for x in Path('/tmp/branches-after.txt').read_text().splitlines() if x]
          data={
              'schema_version':'1.0',
              'repository':'SUNHAOJUN22/TsaoSciComputation',
              'before':before,
              'deleted':[x for x in before if x!='main'],
              'remaining':after,
              'status':'COMPLETE' if after==['main'] else 'FAILED',
          }
          Path('.single-main-complete.json').write_text(json.dumps(data,indent=2,sort_keys=True)+'\n')
          PY
          git add .single-main-complete.json
          git commit -m 'Record verified single-main repository state'
          git push origin HEAD:refs/heads/main
