name: Transfer history forensics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  history:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/tsao-source-forensics'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      workflow_artifact_id: ${{ steps.locate.outputs.workflow_artifact_id }}
    steps:
      - name: Check out full trusted history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
          show-progress: false
      - name: Fetch all repository refs read-only
        shell: bash
        run: |
          set -euo pipefail
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          git fetch --tags origin '+refs/tags/*:refs/tags/*'
      - name: Build complete Git evidence bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p git-evidence
          git for-each-ref --format='%(refname)\t%(objectname)\t%(committerdate:iso8601)' | LC_ALL=C sort > git-evidence/refs.tsv
          git log --all --graph --decorate --oneline --date-order > git-evidence/history.txt
          git bundle create git-evidence/TsaoSciComputation-all-refs.bundle --all
          git bundle verify git-evidence/TsaoSciComputation-all-refs.bundle > git-evidence/bundle-verify.txt 2>&1
          git fsck --full --strict > git-evidence/fsck.txt 2>&1
          sha256sum git-evidence/TsaoSciComputation-all-refs.bundle > git-evidence/SHA256SUMS
      - name: Upload complete Git evidence
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: TsaoSciComputation-complete-git-evidence
          path: git-evidence
          if-no-files-found: error
          retention-days: 7
      - name: Locate Git evidence artifact ID
        id: locate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            curl --fail --silent --show-error --location -H 'Accept: application/vnd.github+json' -H "Authorization: Bearer $GH_TOKEN" -H 'X-GitHub-Api-Version: 2022-11-28' "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts?per_page=100" > /tmp/artifacts.json
            artifact_id=$(python - <<'PY'
          import json
          d=json.load(open('/tmp/artifacts.json'))
          m=[x for x in d.get('artifacts',[]) if x.get('name')=='TsaoSciComputation-complete-git-evidence']
          print(m[0]['id'] if m else '')
          PY
            )
            if [ -n "$artifact_id" ]; then echo "workflow_artifact_id=$artifact_id" >> "$GITHUB_OUTPUT"; exit 0; fi
            sleep 2
          done
          echo 'workflow_artifact_id=' >> "$GITHUB_OUTPUT"
  report:
    needs: history
    if: always()
    name: complete-git-evidence-artifact-${{ needs.history.outputs.workflow_artifact_id }}
    runs-on: ubuntu-latest
    steps:
      - run: echo 'Complete Git evidence artifact ID encoded in job name.'
