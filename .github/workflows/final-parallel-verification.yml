name: Parallel fail-closed final verification

on:
  push:
    branches: [main]
    paths: [.final-parallel-trigger]

permissions:
  contents: write

concurrency:
  group: final-fail-closed-hardening
  cancel-in-progress: true

jobs:
  python310-core:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'
          cache: pip
      - name: Validate Python 3.10 core compatibility
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pip install -e '.[validation,quality]'
          python scripts/sync_package_assets.py
          python scripts/build_adapter_docs.py
          python scripts/build_workflow_docs.py
          python scripts/build_examples.py
          python scripts/build_manifest.py
          python scripts/verify_all.py --profile core

  python313-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip
      - name: Prepare the production release tree
        shell: bash
        run: |
          set -Eeuo pipefail
          find .github/workflows -maxdepth 1 -type f \
            ! -name ci.yml ! -name codeql.yml ! -name release.yml -delete
          find . -maxdepth 1 -type f \( -name '.*trigger*' -o -name '.*status.json' -o -name '.*output.txt' \) -delete
          rm -f reports/FINAL_DIAGNOSIS.json reports/FINAL_DIAGNOSIS.md \
            reports/ROUNDTRIP_DIAGNOSIS.json reports/FINAL_REPAIR_STATUS.json
      - name: Run Python 3.13 release gates
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pip install -e '.[validation,quality]'
          python scripts/sync_package_assets.py
          python scripts/build_adapter_docs.py
          python scripts/build_workflow_docs.py
          python scripts/build_examples.py
          python scripts/build_manifest.py
          python scripts/verify_all.py --profile quality
          python scripts/verify_all.py --profile core
          python scripts/verify_all.py --profile package
          python scripts/verify_all.py --profile benchmark
          python scripts/build_manifest.py
      - name: Validate installation roundtrip and single-main policy
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf /tmp/TsaoSciComputation
          python scripts/install_skill.py --agent codex --scope project \
            --target /tmp/TsaoSciComputation --force
          python scripts/install_skill.py --agent codex --scope project \
            --target /tmp/TsaoSciComputation --validate
          python scripts/install_skill.py --agent codex --scope project \
            --target /tmp/TsaoSciComputation --uninstall
          mapfile -t branches < <(gh api --paginate \
            "repos/$GITHUB_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u)
          test "${#branches[@]}" -eq 1
          test "${branches[0]}" = main

  finalize:
    needs: [python310-core, python313-release]
    if: ${{ needs.python310-core.result == 'success' && needs.python313-release.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip
      - name: Build and verify the clean final tree
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          find .github/workflows -maxdepth 1 -type f \
            ! -name ci.yml ! -name codeql.yml ! -name release.yml -delete
          find . -maxdepth 1 -type f \( -name '.*trigger*' -o -name '.*status.json' -o -name '.*output.txt' \) -delete
          rm -f reports/FINAL_DIAGNOSIS.json reports/FINAL_DIAGNOSIS.md \
            reports/ROUNDTRIP_DIAGNOSIS.json reports/FINAL_REPAIR_STATUS.json
          python -m pip install -e '.[validation,quality]'
          python scripts/sync_package_assets.py
          python scripts/build_adapter_docs.py
          python scripts/build_workflow_docs.py
          python scripts/build_examples.py
          python scripts/build_manifest.py
          python scripts/verify_all.py --profile quality
          python scripts/verify_all.py --profile core
          python scripts/verify_all.py --profile benchmark
          python -m coverage json -o /tmp/tsao-final-coverage.json
      - name: Refresh README and machine-readable evidence
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import json
          import re
          import subprocess
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path('.')
          collection = subprocess.run(
              [sys.executable, '-m', 'pytest', '--collect-only', '-q'],
              check=True,
              capture_output=True,
              text=True,
          )
          match = re.search(r'(\d+) tests? collected', collection.stdout + collection.stderr)
          if match is None:
              raise SystemExit('unable to determine test count')
          tests = int(match.group(1))
          coverage = json.loads(Path('/tmp/tsao-final-coverage.json').read_text(encoding='utf-8'))['totals']
          statement = 100.0 * (coverage['num_statements'] - coverage['missing_lines']) / coverage['num_statements']
          branch = 100.0 * (coverage['num_branches'] - coverage['missing_branches']) / coverage['num_branches']
          security = json.loads((root / 'evidence/security-scan.json').read_text(encoding='utf-8'))
          mutation = json.loads((root / 'evidence/mutation-report.json').read_text(encoding='utf-8'))
          if security['findings']:
              raise SystemExit('security findings remain')
          if mutation['killed'] != 64 or mutation['survived'] != 0:
              raise SystemExit('mutation gate is not 64/64')

          baseline_path = root / 'evidence/quality-baseline.json'
          baseline = json.loads(baseline_path.read_text(encoding='utf-8'))
          baseline['counts']['tests_passed'] = tests
          baseline['counts']['tests_failed'] = 0
          baseline['counts']['controlled_mutants_killed'] = 64
          baseline['counts']['controlled_mutants_survived'] = 0
          baseline['coverage'] = {
              'branches_percent': branch,
              'missing_branches': coverage['missing_branches'],
              'missing_statements': coverage['missing_lines'],
              'statements_percent': statement,
          }
          baseline['security']['repository_findings'] = 0
          baseline_path.write_text(json.dumps(baseline, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          report_path = root / 'reports/REMOTE_FINALIZATION.json'
          report = json.loads(report_path.read_text(encoding='utf-8'))
          report['tests'] = {'errors': 0, 'failures': 0, 'passed': tests}
          report['coverage'] = {
              'covered_branches': coverage['covered_branches'],
              'covered_lines': coverage['covered_lines'],
              'excluded_lines': coverage['excluded_lines'],
              'missing_branches': coverage['missing_branches'],
              'missing_lines': coverage['missing_lines'],
              'num_branches': coverage['num_branches'],
              'num_partial_branches': coverage['num_partial_branches'],
              'num_statements': coverage['num_statements'],
              'percent_branches_covered': branch,
              'percent_branches_covered_display': f'{branch:.0f}',
              'percent_covered': coverage['percent_covered'],
              'percent_covered_display': coverage['percent_covered_display'],
              'percent_statements_covered': statement,
              'percent_statements_covered_display': f'{statement:.0f}',
          }
          report['security'] = {'files_scanned': security['files_scanned'], 'findings': 0}
          report['mutation'] = mutation
          report['hardening'] = {
              'benchmark': 'VALIDATED_SEPARATELY',
              'full_manifest_install_roundtrip': 'VALIDATED',
              'python_310_core_gates': 'VALIDATED',
              'python_313_release_gates': 'VALIDATED',
              'remote_branches': ['main'],
              'status': 'VALIDATED',
              'temporary_branch_created': False,
          }
          report_path.write_text(json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          final_report = {
              'schema_version': '1.0',
              'status': 'VALIDATED',
              'verified_at_utc': datetime.now(timezone.utc).isoformat(),
              'branch': 'main',
              'temporary_branch_created': False,
              'python_310_core': 'PASS',
              'python_313_quality_core_package_benchmark': 'PASS',
              'tests_passed': tests,
              'tests_failed': 0,
              'statement_coverage_percent': statement,
              'branch_coverage_percent': branch,
              'controlled_mutants': '64/64',
              'security_findings': 0,
              'source_archives_reproducible': True,
              'wheel_reproducible_and_isolated_install': True,
              'skill_install_validate_uninstall': True,
              'remote_branches': ['main'],
          }
          (root / 'reports/FINAL_VERIFICATION.json').write_text(
              json.dumps(final_report, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )

          updates = (
              (
                  'README.md',
                  r'\| Tests \| \d+ passed, \d+ failed \|',
                  r'\| Statement / branch coverage \| [^|]+ \|',
                  f'| Tests | {tests} passed, 0 failed |',
                  f'| Statement / branch coverage | {statement:.2f}% / {branch:.2f}% |',
              ),
              (
                  'README.zh-CN.md',
                  r'\| 自动测试 \| \d+ 通过，\d+ 失败 \|',
                  r'\| 语句 / 分支覆盖率 \| [^|]+ \|',
                  f'| 自动测试 | {tests} 通过，0 失败 |',
                  f'| 语句 / 分支覆盖率 | {statement:.2f}% / {branch:.2f}% |',
              ),
          )
          for filename, test_pattern, coverage_pattern, test_text, coverage_text in updates:
              path = root / filename
              text = path.read_text(encoding='utf-8')
              text = re.sub(test_pattern, test_text, text)
              text = re.sub(coverage_pattern, coverage_text, text)
              path.write_text(text, encoding='utf-8')
          PY
          python scripts/build_manifest.py
          python scripts/validate_repository.py
          python scripts/validate_schemas.py
          python scripts/sync_package_assets.py --check
          python scripts/build_capability_index.py --check
          python scripts/build_adapter_docs.py --check
          python scripts/build_workflow_docs.py --check
          python scripts/build_examples.py --check
          python scripts/build_manifest.py --check
          python -m pytest -q
      - name: Publish the verified production tree
        shell: bash
        run: |
          set -Eeuo pipefail
          git add -A
          git commit -m 'Finalize verified production tree and README evidence'
          git push origin HEAD:refs/heads/main

  report-failure:
    needs: [python310-core, python313-release]
    if: ${{ always() && (needs.python310-core.result != 'success' || needs.python313-release.result != 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - name: Record the failed gate
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          mkdir -p reports
          cat > reports/FINAL_VERIFICATION.json <<EOF
          {
            "schema_version": "1.0",
            "status": "FAILED",
            "python_310_core": "${{ needs.python310-core.result }}",
            "python_313_release": "${{ needs.python313-release.result }}",
            "temporary_branch_created": false,
            "branch": "main"
          }
          EOF
          git add reports/FINAL_VERIFICATION.json
          git commit -m 'Record final verification failure' || true
          git push origin HEAD:refs/heads/main || true
