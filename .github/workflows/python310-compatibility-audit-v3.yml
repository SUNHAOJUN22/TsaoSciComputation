name: Python 3.10 compatibility audit v3

on:
  push:
    branches: [main]
    paths: [.python310-compatibility-trigger-v3]

permissions:
  contents: write

concurrency:
  group: python310-compatibility-audit
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FINAL_TREE: /tmp/tsao-python310-final-tree-v3
      STATUS_FILE: .python310-compatibility-status.json
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'
          cache: pip

      - name: Verify and publish
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          STAGE=initialization
          record_status() {
            local outcome="$1"
            local stage="$2"
            cd "$GITHUB_WORKSPACE"
            printf '{\n  "outcome": "%s",\n  "schema_version": "1.0",\n  "stage": "%s"\n}\n' "$outcome" "$stage" > "$STATUS_FILE"
            git add "$STATUS_FILE"
            git commit -m "Record Python compatibility audit: $outcome at $stage" || true
            git push origin HEAD:refs/heads/main || true
          }
          trap 'record_status failure "$STAGE"' ERR

          STAGE=prepare-tree
          rm -rf "$FINAL_TREE"
          git worktree add --detach "$FINAL_TREE" HEAD
          cd "$FINAL_TREE"
          rm -f \
            .github/workflows/python310-compatibility-audit.yml \
            .github/workflows/python310-compatibility-audit-v2.yml \
            .github/workflows/python310-compatibility-audit-v3.yml \
            .python310-compatibility-trigger \
            .python310-compatibility-trigger-v2 \
            .python310-compatibility-trigger-v3 \
            .python310-compatibility-status.json

          STAGE=patch-source
          python - <<'PY'
          from pathlib import Path

          path = Path('tsao_computation/repository_audit.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('\nimport tomllib\n', '\n', 1)
          anchor = '\n\ndef _load_json(path: Path, problems: list[str]) -> Any:\n'
          helper = '''


def _parse_project_version(text: str) -> str:
    in_project = False
    for raw_line in text.splitlines():
        line = raw_line.strip()
        if not line or line.startswith("#"):
            continue
        if line.startswith("[") and line.endswith("]"):
            in_project = line == "[project]"
            continue
        if not in_project:
            continue
        key, separator, raw_value = line.partition("=")
        if key.strip() != "version" or not separator:
            continue
        value = raw_value.split("#", 1)[0].strip()
        if len(value) >= 2 and value[0] == value[-1] and value[0] in {"\\\"", "'"}:
            return value[1:-1]
        raise ValueError("[project].version must be a quoted string")
    raise ValueError("missing [project].version")
'''
          if '_parse_project_version' not in text:
              if anchor not in text:
                  raise SystemExit('helper anchor missing')
              text = text.replace(anchor, helper + anchor, 1)
          old = '''    pyproject_path = root / "pyproject.toml"
    if pyproject_path.is_file():
        try:
            project_version = tomllib.loads(pyproject_path.read_text(encoding="utf-8"))["project"][
                "version"
            ]
            if project_version != __version__:
                problems.append("pyproject version and package __version__ differ")
        except (OSError, UnicodeDecodeError, tomllib.TOMLDecodeError, KeyError, TypeError) as exc:
            problems.append(f"invalid pyproject.toml: {exc}")
'''
          new = '''    pyproject_path = root / "pyproject.toml"
    if pyproject_path.is_file():
        try:
            project_version = _parse_project_version(
                pyproject_path.read_text(encoding="utf-8")
            )
            if project_version != __version__:
                problems.append("pyproject version and package __version__ differ")
        except (OSError, UnicodeDecodeError, ValueError) as exc:
            problems.append(f"invalid pyproject.toml: {exc}")
'''
          if old in text:
              text = text.replace(old, new, 1)
          if 'tomllib' in text:
              raise SystemExit('tomllib remains')
          path.write_text(text, encoding='utf-8')

          Path('tests/test_python_compatibility.py').write_text('''from __future__ import annotations

import ast
from pathlib import Path

import pytest

from tsao_computation.repository_audit import _parse_project_version


def test_project_version_parser_uses_project_table() -> None:
    text = """[tool.example]\nversion = \"99.0\"\n\n[project]\nname = \"demo\"\nversion = \"3.0.0\" # release\n"""
    assert _parse_project_version(text) == "3.0.0"


def test_project_version_parser_accepts_single_quotes() -> None:
    assert _parse_project_version("[project]\\nversion = '3.0.0'\\n") == "3.0.0"


@pytest.mark.parametrize(
    "text",
    ("", "[project]\\nname = 'demo'\\n", "[project]\\nversion = 3\\n"),
)
def test_project_version_parser_rejects_invalid_values(text: str) -> None:
    with pytest.raises(ValueError, match="project.*version"):
        _parse_project_version(text)


def test_repository_audit_source_is_python310_compatible() -> None:
    source = Path("tsao_computation/repository_audit.py").read_text(encoding="utf-8")
    ast.parse(source, filename="repository_audit.py", feature_version=(3, 10))
    assert "tomllib" not in source
''', encoding='utf-8')

          notes = {
              'README.md': ('## Verification\n', 'The minimum supported interpreter is Python 3.10; CI validates Python 3.10 and 3.13.'),
              'README.zh-CN.md': ('## 统一验证\n', '最低支持 Python 3.10；CI 对 Python 3.10 与 3.13 进行验证。'),
          }
          for filename, (marker, sentence) in notes.items():
              target = Path(filename)
              content = target.read_text(encoding='utf-8')
              if sentence not in content:
                  target.write_text(content.replace(marker, marker + '\n' + sentence + '\n', 1), encoding='utf-8')
          PY

          STAGE=python310-install
          python -m pip install -e '.[validation,quality]'
          python -m ruff format tsao_computation/repository_audit.py tests/test_python_compatibility.py
          python scripts/build_manifest.py
          STAGE=python310-all
          python scripts/verify_all.py --profile all

          STAGE=python313-setup
          python - <<'PY'
          import os
          from pathlib import Path
          Path('/tmp/python310-tree-ready').write_text(os.environ['FINAL_TREE'])
          PY
          echo "$FINAL_TREE" > /tmp/final-tree-path
          STAGE=publish-patch
          cd "$GITHUB_WORKSPACE"
          for path in \
            tsao_computation/repository_audit.py \
            tests/test_python_compatibility.py \
            README.md README.zh-CN.md manifest.json \
            evidence/quality-check.json evidence/security-scan.json; do
            if [ -f "$FINAL_TREE/$path" ]; then
              mkdir -p "$(dirname "$path")"
              cp "$FINAL_TREE/$path" "$path"
              git add "$path"
            fi
          done
          git commit -m 'Restore Python 3.10 compatibility'
          git push origin HEAD:refs/heads/main
          record_status success python310-release-gates
