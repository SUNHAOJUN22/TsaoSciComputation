name: One-shot main revalidation

on:
  push:
    branches: [main]
    paths: [.revalidate-main]

permissions:
  contents: write

concurrency:
  group: tsao-main-revalidation
  cancel-in-progress: true

jobs:
  revalidate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Configure repository
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'
          cache: pip

      - name: Revalidate Python 3.10 core gates
        shell: bash
        run: |
          set -Eeuo pipefail
          STAGE=python-3.10-core
          exec > >(tee /tmp/tsao-revalidation.log) 2>&1
          record_failure() {
            code=$?
            set +e
            export STAGE code
            python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          log = Path('/tmp/tsao-revalidation.log')
          tail = '\n'.join(log.read_text(encoding='utf-8', errors='replace').splitlines()[-180:]) if log.exists() else ''
          payload = {
              'schema_version': '1.0',
              'status': 'FAILED',
              'stage': os.environ['STAGE'],
              'exit_code': int(os.environ['code']),
              'branch': 'main',
              'temporary_branch_created': False,
              'failed_at_utc': datetime.now(timezone.utc).isoformat(),
              'log_tail': tail,
          }
          path = Path('reports/REVALIDATION_FAILURE.json')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
            git add reports/REVALIDATION_FAILURE.json
            git commit -m "Record main revalidation failure at ${STAGE}" || true
            git push origin HEAD:refs/heads/main || true
            exit "$code"
          }
          trap record_failure ERR
          rm -f .github/workflows/revalidate-main.yml .revalidate-main reports/REVALIDATION_FAILURE.json
          python -m pip install -e '.[validation,quality]'
          python scripts/sync_package_assets.py
          python scripts/build_adapter_docs.py
          python scripts/build_workflow_docs.py
          python scripts/build_examples.py
          python scripts/build_manifest.py
          python scripts/verify_all.py --profile core
          trap - ERR

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip

      - name: Revalidate, refresh README, and publish clean main
        shell: bash
        run: |
          set -Eeuo pipefail
          STAGE=python-3.13-release
          : > /tmp/tsao-revalidation.log
          exec > >(tee /tmp/tsao-revalidation.log) 2>&1
          record_failure() {
            code=$?
            set +e
            export STAGE code
            python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          log = Path('/tmp/tsao-revalidation.log')
          tail = '\n'.join(log.read_text(encoding='utf-8', errors='replace').splitlines()[-180:]) if log.exists() else ''
          payload = {
              'schema_version': '1.0',
              'status': 'FAILED',
              'stage': os.environ['STAGE'],
              'exit_code': int(os.environ['code']),
              'branch': 'main',
              'temporary_branch_created': False,
              'failed_at_utc': datetime.now(timezone.utc).isoformat(),
              'log_tail': tail,
          }
          path = Path('reports/REVALIDATION_FAILURE.json')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
            git add reports/REVALIDATION_FAILURE.json
            git commit -m "Record main revalidation failure at ${STAGE}" || true
            git push origin HEAD:refs/heads/main || true
            exit "$code"
          }
          trap record_failure ERR

          STAGE=prepare-clean-tree
          rm -f .github/workflows/revalidate-main.yml .revalidate-main reports/REVALIDATION_FAILURE.json
          python -m pip install -e '.[validation,quality]'
          python scripts/sync_package_assets.py
          python scripts/build_adapter_docs.py
          python scripts/build_workflow_docs.py
          python scripts/build_examples.py
          python scripts/build_manifest.py

          STAGE=python-3.13-all
          python scripts/verify_all.py --profile all

          STAGE=benchmark
          python scripts/verify_all.py --profile benchmark
          python scripts/build_manifest.py

          STAGE=skill-roundtrip
          rm -rf /tmp/TsaoSciComputation
          python scripts/install_skill.py --agent codex --scope project --target /tmp/TsaoSciComputation --force
          python scripts/install_skill.py --agent codex --scope project --target /tmp/TsaoSciComputation --validate
          python scripts/install_skill.py --agent codex --scope project --target /tmp/TsaoSciComputation --uninstall

          STAGE=single-main-policy
          mapfile -t branches < <(gh api --paginate "repos/$GITHUB_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u)
          test "${#branches[@]}" -eq 1
          test "${branches[0]}" = main

          STAGE=refresh-evidence
          python -m coverage json -o /tmp/tsao-revalidation-coverage.json
          python - <<'PY'
          import json
          import re
          import subprocess
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path('.')
          collection = subprocess.run(
              [sys.executable, '-m', 'pytest', '--collect-only', '-q'],
              check=True,
              capture_output=True,
              text=True,
          )
          match = re.search(r'(\d+) tests? collected', collection.stdout + collection.stderr)
          if match is None:
              raise SystemExit('unable to determine test count')
          tests = int(match.group(1))
          coverage = json.loads(Path('/tmp/tsao-revalidation-coverage.json').read_text(encoding='utf-8'))['totals']
          statement = 100.0 * (coverage['num_statements'] - coverage['missing_lines']) / coverage['num_statements']
          branch = 100.0 * (coverage['num_branches'] - coverage['missing_branches']) / coverage['num_branches']
          security = json.loads((root / 'evidence/security-scan.json').read_text(encoding='utf-8'))
          mutation = json.loads((root / 'evidence/mutation-report.json').read_text(encoding='utf-8'))
          if security['findings']:
              raise SystemExit('security findings remain')
          if mutation['killed'] != 64 or mutation['survived'] != 0:
              raise SystemExit('mutation gate is not 64/64')

          baseline_path = root / 'evidence/quality-baseline.json'
          baseline = json.loads(baseline_path.read_text(encoding='utf-8'))
          baseline['counts']['tests_passed'] = tests
          baseline['counts']['tests_failed'] = 0
          baseline['counts']['controlled_mutants_killed'] = mutation['killed']
          baseline['counts']['controlled_mutants_survived'] = mutation['survived']
          baseline['coverage'] = {
              'branches_percent': branch,
              'missing_branches': coverage['missing_branches'],
              'missing_statements': coverage['missing_lines'],
              'statements_percent': statement,
          }
          baseline['security']['repository_findings'] = 0
          baseline_path.write_text(json.dumps(baseline, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          report = {
              'schema_version': '1.0',
              'status': 'VALIDATED',
              'verified_at_utc': datetime.now(timezone.utc).isoformat(),
              'branch': 'main',
              'remote_branches': ['main'],
              'temporary_branch_created': False,
              'python_310_core': 'PASS',
              'python_313_all': 'PASS',
              'benchmark': 'PASS',
              'tests_passed': tests,
              'tests_failed': 0,
              'statement_coverage_percent': statement,
              'branch_coverage_percent': branch,
              'controlled_mutants': f"{mutation['killed']}/64",
              'security_findings': 0,
              'source_archives_reproducible': True,
              'wheel_reproducible_and_isolated_install': True,
              'skill_install_validate_uninstall': True,
          }
          (root / 'reports/FINAL_VERIFICATION.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )

          updates = (
              (
                  'README.md',
                  r'\| Tests \| \d+ passed, \d+ failed \|',
                  r'\| Statement / branch coverage \| [^|]+ \|',
                  f'| Tests | {tests} passed, 0 failed |',
                  f'| Statement / branch coverage | {statement:.2f}% / {branch:.2f}% |',
                  'The authoritative machine-readable evidence is in `reports/FINAL_VERIFICATION.json`, `evidence/quality-baseline.json`, `reports/REMOTE_FINALIZATION.json`, and `benchmarks/latest.json`.',
              ),
              (
                  'README.zh-CN.md',
                  r'\| 自动测试 \| \d+ 通过，\d+ 失败 \|',
                  r'\| 语句 / 分支覆盖率 \| [^|]+ \|',
                  f'| 自动测试 | {tests} 通过，0 失败 |',
                  f'| 语句 / 分支覆盖率 | {statement:.2f}% / {branch:.2f}% |',
                  '权威机器可读证据位于 `reports/FINAL_VERIFICATION.json`、`evidence/quality-baseline.json`、`reports/REMOTE_FINALIZATION.json` 和 `benchmarks/latest.json`。',
              ),
          )
          for filename, test_pattern, coverage_pattern, test_text, coverage_text, evidence_line in updates:
              path = root / filename
              text = path.read_text(encoding='utf-8')
              text = re.sub(test_pattern, test_text, text)
              text = re.sub(coverage_pattern, coverage_text, text)
              lines = text.splitlines()
              for index, line in enumerate(lines):
                  if 'authoritative machine-readable evidence' in line or '权威机器可读证据位于' in line:
                      lines[index] = evidence_line
                      break
              path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

          STAGE=clean-final-validation
          python scripts/build_manifest.py
          python scripts/validate_repository.py
          python scripts/validate_schemas.py
          python scripts/sync_package_assets.py --check
          python scripts/build_capability_index.py --check
          python scripts/build_adapter_docs.py --check
          python scripts/build_workflow_docs.py --check
          python scripts/build_examples.py --check
          python scripts/build_manifest.py --check
          python -m pytest -q

          STAGE=publish
          git add -A
          git commit -m 'Revalidate main and refresh README evidence'
          git push origin HEAD:refs/heads/main
          trap - ERR
