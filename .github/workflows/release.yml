name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Immutable release tag matching v$(cat VERSION)
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip

      - name: Validate immutable release request
        shell: bash
        run: |
          set -Eeuo pipefail
          VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"
          TAG="${{ inputs.tag }}"
          test "$TAG" = "v$VERSION_VALUE"
          echo "VERSION_VALUE=$VERSION_VALUE" >> "$GITHUB_ENV"
          python scripts/sync_version_metadata.py --check
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release already exists: $TAG" >&2
            exit 2
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag already exists without a release: $TAG" >&2
            exit 3
          fi

      - name: Build and verify release artifacts
        shell: bash
        run: |
          set -Eeuo pipefail
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct "$GITHUB_SHA")"
          python -m pip install -e '.[validation,quality]'
          python scripts/sync_package_assets.py
          python scripts/build_adapter_docs.py
          python scripts/build_workflow_docs.py
          python scripts/build_examples.py
          python scripts/build_manifest.py
          python scripts/verify_all.py --profile all
          python scripts/verify_all.py --profile benchmark
          cp reports/FINAL_VERIFICATION.json dist/FINAL_VERIFICATION.json
          python scripts/build_release_manifest.py --output-dir dist

      - name: Attest release provenance
        id: provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: |
            dist/TsaoSciComputation-*.zip
            dist/TsaoSciComputation-*.tar.gz
            dist/tsao_scicomputation-*.whl

      - name: Attest release SBOM
        id: sbom-attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: |
            dist/TsaoSciComputation-*.zip
            dist/TsaoSciComputation-*.tar.gz
            dist/tsao_scicomputation-*.whl
          sbom-path: dist/TsaoSciComputation-${{ env.VERSION_VALUE }}.spdx.json

      - name: Complete release evidence bundle
        shell: bash
        run: |
          set -Eeuo pipefail
          cp "${{ steps.provenance.outputs.bundle-path }}" \
            "dist/TsaoSciComputation-${VERSION_VALUE}.provenance.sigstore.json"
          cp "${{ steps.sbom-attestation.outputs.bundle-path }}" \
            "dist/TsaoSciComputation-${VERSION_VALUE}.sbom.sigstore.json"
          python scripts/build_release_manifest.py --output-dir dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: TsaoSciComputation-${{ inputs.tag }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/*
          if-no-files-found: error
          retention-days: 90

      - name: Publish immutable tag and GitHub Release
        shell: bash
        run: |
          set -Eeuo pipefail
          TAG="${{ inputs.tag }}"
          cleanup_unpublished_tag() {
            code=$?
            set +e
            if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              git push origin ":refs/tags/$TAG" || true
            fi
            exit "$code"
          }
          trap cleanup_unpublished_tag ERR
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "$TAG" "$GITHUB_SHA" -m "TsaoSciComputation $TAG"
          git push origin "refs/tags/$TAG"
          gh release create "$TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --latest \
            --title "TsaoSciComputation $TAG" \
            --notes-file "docs/releases/v${VERSION_VALUE}.md"
          trap - ERR

      - name: Verification guidance
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Consumer verification

          ```bash
          sha256sum -c SHA256SUMS
          gh attestation verify TsaoSciComputation-X.Y.Z.zip \
            --repo SUNHAOJUN22/TsaoSciComputation
          ```
          EOF
