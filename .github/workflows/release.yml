name: Release candidate

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
      - run: python -m pip install -e '.[validation,quality]'
      - run: python scripts/run_tests.py --coverage
      - run: python scripts/quality_check.py
      - run: python scripts/validate_repository.py
      - run: python scripts/validate_schemas.py
      - run: python scripts/security_scan.py
      - run: python scripts/run_mutation_gate.py
      - run: python scripts/sync_package_assets.py --check
      - run: python scripts/build_manifest.py --check
      - run: SOURCE_DATE_EPOCH=1700000000 python scripts/package_release.py
      - run: python scripts/verify_wheel.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: TsaoSciComputation-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30
