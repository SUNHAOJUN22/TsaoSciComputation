name: Python 3.10 compatibility audit v2

on:
  push:
    branches: [main]
    paths: [.python310-compatibility-trigger-v2]

permissions:
  contents: write

concurrency:
  group: python310-compatibility-audit
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FINAL_TREE: /tmp/tsao-python310-final-tree-v2
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'
          cache: pip

      - name: Patch and verify Python 3.10
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -rf "$FINAL_TREE"
          git worktree add --detach "$FINAL_TREE" HEAD
          cd "$FINAL_TREE"
          rm -f \
            .github/workflows/python310-compatibility-audit.yml \
            .github/workflows/python310-compatibility-audit-v2.yml \
            .python310-compatibility-trigger \
            .python310-compatibility-trigger-v2

          python - <<'PY'
          from pathlib import Path

          audit = Path('tsao_computation/repository_audit.py')
          text = audit.read_text(encoding='utf-8')
          text = text.replace('import json\nfrom pathlib import Path', 'import json\nimport re\nfrom pathlib import Path', 1)
          text = text.replace('\nimport tomllib\n', '\n', 1)
          anchor = '\n\ndef _load_json(path: Path, problems: list[str]) -> Any:\n'
          helper = """

_PROJECT_HEADER = re.compile(r"^\\s*\\[project\\]\\s*(?:#.*)?$")
_TABLE_HEADER = re.compile(r"^\\s*\\[.+\\]\\s*(?:#.*)?$")
_PROJECT_VERSION = re.compile(
    r"^\\s*version\\s*=\\s*(?:\\\"([^\\\"\\n]+)\\\"|'([^'\\n]+)')\\s*(?:#.*)?$"
)


def _parse_project_version(text: str) -> str:
    in_project = False
    for raw_line in text.splitlines():
        line = raw_line.strip()
        if not line or line.startswith("#"):
            continue
        if _TABLE_HEADER.fullmatch(line):
            in_project = bool(_PROJECT_HEADER.fullmatch(line))
            continue
        if not in_project:
            continue
        match = _PROJECT_VERSION.fullmatch(line)
        if match:
            return match.group(1) or match.group(2)
    raise ValueError("missing quoted [project].version")
"""
          if '_parse_project_version' not in text:
              if anchor not in text:
                  raise SystemExit('helper anchor missing')
              text = text.replace(anchor, helper + anchor, 1)
          old = '''    pyproject_path = root / "pyproject.toml"
    if pyproject_path.is_file():
        try:
            project_version = tomllib.loads(pyproject_path.read_text(encoding="utf-8"))["project"][
                "version"
            ]
            if project_version != __version__:
                problems.append("pyproject version and package __version__ differ")
        except (OSError, UnicodeDecodeError, tomllib.TOMLDecodeError, KeyError, TypeError) as exc:
            problems.append(f"invalid pyproject.toml: {exc}")
'''
          new = '''    pyproject_path = root / "pyproject.toml"
    if pyproject_path.is_file():
        try:
            project_version = _parse_project_version(
                pyproject_path.read_text(encoding="utf-8")
            )
            if project_version != __version__:
                problems.append("pyproject version and package __version__ differ")
        except (OSError, UnicodeDecodeError, ValueError) as exc:
            problems.append(f"invalid pyproject.toml: {exc}")
'''
          if old in text:
              text = text.replace(old, new, 1)
          if 'tomllib' in text:
              raise SystemExit('tomllib remains in repository audit')
          audit.write_text(text, encoding='utf-8')

          Path('tests/test_python_compatibility.py').write_text('''from __future__ import annotations

import ast
from pathlib import Path

import pytest

from tsao_computation.repository_audit import _parse_project_version


def test_project_version_parser_uses_project_table() -> None:
    text = """[tool.example]\nversion = \"99.0\"\n\n[project]\nname = \"demo\"\nversion = \"3.0.0\" # release\n"""
    assert _parse_project_version(text) == "3.0.0"


def test_project_version_parser_accepts_single_quotes() -> None:
    assert _parse_project_version("[project]\\nversion = '3.0.0'\\n") == "3.0.0"


@pytest.mark.parametrize(
    "text",
    ("", "[project]\\nname = 'demo'\\n", "[project]\\nversion = 3\\n"),
)
def test_project_version_parser_rejects_invalid_values(text: str) -> None:
    with pytest.raises(ValueError, match="project.*version"):
        _parse_project_version(text)


def test_repository_audit_source_is_python310_compatible() -> None:
    source = Path("tsao_computation/repository_audit.py").read_text(encoding="utf-8")
    ast.parse(source, filename="repository_audit.py", feature_version=(3, 10))
    assert "tomllib" not in source
''', encoding='utf-8')

          messages = {
              'README.md': ('## Verification\n', 'The minimum supported interpreter is Python 3.10; CI validates Python 3.10 and 3.13.'),
              'README.zh-CN.md': ('## 统一验证\n', '最低支持 Python 3.10；CI 对 Python 3.10 与 3.13 进行验证。'),
          }
          for filename, (marker, sentence) in messages.items():
              path = Path(filename)
              content = path.read_text(encoding='utf-8')
              if sentence not in content:
                  content = content.replace(marker, marker + '\n' + sentence + '\n', 1)
              path.write_text(content, encoding='utf-8')
          PY

          python -m pip install -e '.[validation,quality]'
          python -m ruff format tsao_computation/repository_audit.py tests/test_python_compatibility.py
          python scripts/build_manifest.py
          python scripts/verify_all.py --profile all

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip

      - name: Cross-check Python 3.13 and refresh evidence
        shell: bash
        run: |
          set -euo pipefail
          cd "$FINAL_TREE"
          python -m pip install -e '.[validation,quality]'
          python scripts/verify_all.py --profile quality
          python scripts/build_manifest.py
          python scripts/verify_all.py --profile core
          python scripts/verify_all.py --profile benchmark
          python -m coverage json -o /tmp/tsao-pycompat-coverage.json

          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          root = Path(os.environ['FINAL_TREE'])
          collected = subprocess.run(
              [sys.executable, '-m', 'pytest', '--collect-only', '-q'],
              cwd=root, check=True, capture_output=True, text=True,
          )
          match = re.search(r'(\d+) tests? collected', collected.stdout + collected.stderr)
          if match is None:
              raise SystemExit('test count unavailable')
          tests = int(match.group(1))
          totals = json.loads(Path('/tmp/tsao-pycompat-coverage.json').read_text(encoding='utf-8'))['totals']
          statements = 100.0 * (totals['num_statements'] - totals['missing_lines']) / totals['num_statements']
          branches = 100.0 * (totals['num_branches'] - totals['missing_branches']) / totals['num_branches']
          security = json.loads((root / 'evidence/security-scan.json').read_text(encoding='utf-8'))

          baseline_path = root / 'evidence/quality-baseline.json'
          baseline = json.loads(baseline_path.read_text(encoding='utf-8'))
          baseline['counts']['tests_passed'] = tests
          baseline['counts']['tests_failed'] = 0
          baseline['coverage'] = {
              'branches_percent': branches,
              'missing_branches': totals['missing_branches'],
              'missing_statements': totals['missing_lines'],
              'statements_percent': statements,
          }
          baseline['security']['repository_findings'] = len(security['findings'])
          baseline_path.write_text(json.dumps(baseline, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          report_path = root / 'reports/REMOTE_FINALIZATION.json'
          report = json.loads(report_path.read_text(encoding='utf-8'))
          report['tests'] = {'errors': 0, 'failures': 0, 'passed': tests}
          report['security'] = {'files_scanned': security['files_scanned'], 'findings': len(security['findings'])}
          report['python_compatibility'] = {
              'minimum_supported': '3.10',
              'python_310_release_gates': 'VALIDATED',
              'python_313_core_quality_benchmark': 'VALIDATED',
              'runtime_compatibility_dependency_added': False,
              'status': 'VALIDATED',
              'temporary_branch_created': False,
          }
          report['coverage'].update({
              'covered_branches': totals['covered_branches'],
              'covered_lines': totals['covered_lines'],
              'excluded_lines': totals['excluded_lines'],
              'missing_branches': totals['missing_branches'],
              'missing_lines': totals['missing_lines'],
              'num_branches': totals['num_branches'],
              'num_partial_branches': totals['num_partial_branches'],
              'num_statements': totals['num_statements'],
              'percent_branches_covered': branches,
              'percent_branches_covered_display': f'{branches:.0f}',
              'percent_covered': totals['percent_covered'],
              'percent_covered_display': totals['percent_covered_display'],
              'percent_statements_covered': statements,
              'percent_statements_covered_display': f'{statements:.0f}',
          })
          report_path.write_text(json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          replacements = (
              ('README.md', r'\| Tests \| \d+ passed, \d+ failed \|', f'| Tests | {tests} passed, 0 failed |', r'\| Statement / branch coverage \| [^|]+ \|', f'| Statement / branch coverage | {statements:.2f}% / {branches:.2f}% |'),
              ('README.zh-CN.md', r'\| 自动测试 \| \d+ 通过，\d+ 失败 \|', f'| 自动测试 | {tests} 通过，0 失败 |', r'\| 语句 / 分支覆盖率 \| [^|]+ \|', f'| 语句 / 分支覆盖率 | {statements:.2f}% / {branches:.2f}% |'),
          )
          for filename, test_pattern, test_value, coverage_pattern, coverage_value in replacements:
              path = root / filename
              content = re.sub(test_pattern, test_value, path.read_text(encoding='utf-8'))
              path.write_text(re.sub(coverage_pattern, coverage_value, content), encoding='utf-8')
          PY

          python scripts/build_manifest.py
          python scripts/build_manifest.py --check
          python scripts/verify_all.py --profile core

          cd "$GITHUB_WORKSPACE"
          : > /tmp/durable-paths.txt
          git -C "$FINAL_TREE" diff --name-only | while IFS= read -r path; do
            case "$path" in
              .github/workflows/python310-compatibility-audit.yml|.github/workflows/python310-compatibility-audit-v2.yml|.python310-compatibility-trigger|.python310-compatibility-trigger-v2)
                continue ;;
            esac
            if [ -f "$FINAL_TREE/$path" ]; then
              mkdir -p "$(dirname "$path")"
              cp "$FINAL_TREE/$path" "$path"
              printf '%s\n' "$path" >> /tmp/durable-paths.txt
            fi
          done
          if [ -s /tmp/durable-paths.txt ]; then
            while IFS= read -r path; do git add "$path"; done < /tmp/durable-paths.txt
            git commit -m 'Restore Python 3.10 compatibility and refresh evidence'
            git push origin HEAD:refs/heads/main
          fi
