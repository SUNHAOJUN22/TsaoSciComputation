name: Apply tested final repository repair

on:
  push:
    branches: [main]
    paths: [.final-repair-trigger]

permissions:
  contents: write

concurrency:
  group: final-fail-closed-hardening
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip
      - name: Repair benchmark-to-manifest ordering
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          STAGE=initialization
          record_failure() {
            set +e
            mkdir -p reports
            printf '{\n  "schema_version": "1.0",\n  "status": "FAILED",\n  "stage": "%s",\n  "branch": "main",\n  "temporary_branch_created": false\n}\n' "$STAGE" > reports/FINAL_REPAIR_STATUS.json
            git add reports/FINAL_REPAIR_STATUS.json
            git commit -m "Record final repair failure at $STAGE" || true
            git push origin HEAD:refs/heads/main || true
          }
          trap record_failure ERR

          STAGE=dependencies
          python -m pip install -e '.[validation,quality]'

          STAGE=workflow-migration
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/final-parallel-verification.yml')
          text = path.read_text(encoding='utf-8')
          old = '''          python scripts/verify_all.py --profile package
                    python scripts/verify_all.py --profile benchmark
                - name: Validate installation roundtrip and single-main policy'''
          new = '''          python scripts/verify_all.py --profile package
                    python scripts/verify_all.py --profile benchmark
                    python scripts/build_manifest.py
                - name: Validate installation roundtrip and single-main policy'''
          if old not in text:
              raise SystemExit('final workflow ordering anchor not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

          STAGE=generated-assets
          python scripts/build_manifest.py
          STAGE=quality
          python scripts/verify_all.py --profile quality
          STAGE=core
          python scripts/verify_all.py --profile core

          STAGE=publish
          rm -f reports/FINAL_REPAIR_STATUS.json
          python scripts/build_manifest.py
          git add -A
          git commit -m 'Refresh manifest after benchmark before installation roundtrip'
          git push origin HEAD:refs/heads/main
          trap - ERR
