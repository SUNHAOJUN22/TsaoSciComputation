name: Apply tested final repository repair

on:
  push:
    branches: [main]
    paths: [.final-repair-trigger]

permissions:
  contents: write

concurrency:
  group: final-fail-closed-hardening
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip
      - name: Apply and verify bootstrap compatibility
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          STAGE=initialization
          record_failure() {
            set +e
            mkdir -p reports
            printf '{\n  "schema_version": "1.0",\n  "status": "FAILED",\n  "stage": "%s",\n  "branch": "main",\n  "temporary_branch_created": false\n}\n' "$STAGE" > reports/FINAL_REPAIR_STATUS.json
            git add reports/FINAL_REPAIR_STATUS.json
            git commit -m "Record final repair failure at $STAGE" || true
            git push origin HEAD:refs/heads/main || true
          }
          trap record_failure ERR

          STAGE=dependencies
          python -m pip install -e '.[validation,quality]'

          STAGE=bootstrap-migration
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/run_mutation_gate.py')
          text = path.read_text(encoding='utf-8')
          old = '''try:
              from . import _bootstrap  # noqa: F401
          except ImportError:
              import _bootstrap  # noqa: F401'''
          if old not in text:
              raise SystemExit('mutation bootstrap anchor not found')
          path.write_text(text.replace(old, 'import _bootstrap  # noqa: F401', 1), encoding='utf-8')
          PY

          STAGE=ruff
          python -m ruff check --fix tsao_computation scripts tests _bootstrap.py
          python -m ruff format tsao_computation scripts tests _bootstrap.py

          STAGE=generated-assets
          python scripts/sync_package_assets.py
          python scripts/build_adapter_docs.py
          python scripts/build_workflow_docs.py
          python scripts/build_examples.py
          python scripts/build_manifest.py

          STAGE=quality
          python scripts/verify_all.py --profile quality
          STAGE=core
          python scripts/verify_all.py --profile core

          STAGE=publish
          rm -f reports/FINAL_REPAIR_STATUS.json
          python scripts/build_manifest.py
          git add -A
          git commit -m 'Fix bootstrap compatibility across script and module entry points'
          git push origin HEAD:refs/heads/main
          trap - ERR
