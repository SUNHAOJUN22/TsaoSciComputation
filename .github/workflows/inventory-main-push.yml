name: Inventory main workflows on trigger

on:
  push:
    branches: [main]
    paths: [.inventory-trigger]

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 1
      - name: Commit exact workflow inventory
        run: |
          set -euo pipefail
          find .github/workflows -maxdepth 1 -type f -printf '%f\t%s bytes\n' | sort > .main-workflows-inventory.tsv
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .main-workflows-inventory.tsv
          git commit -m 'Record current main workflow inventory'
          git push origin HEAD:main
