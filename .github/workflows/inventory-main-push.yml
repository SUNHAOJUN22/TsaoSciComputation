name: Inventory main workflows on trigger

on:
  push:
    branches: [main]
    paths: [.inventory-trigger]

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false
      - name: Record exact workflow inventory
        run: |
          set -euo pipefail
          mkdir -p /tmp/main-workflows
          find .github/workflows -maxdepth 1 -type f -printf '%f\t%s bytes\n' | sort | tee /tmp/main-workflows/inventory.tsv
          sha256sum .github/workflows/* | sort > /tmp/main-workflows/SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: TsaoSciComputation-current-main-workflows
          path: /tmp/main-workflows
          if-no-files-found: error
          retention-days: 7
