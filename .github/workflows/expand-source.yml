name: Expand verified TsaoSciComputation v1 source

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: expand-v1-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  expand:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/release-v1.0.0'
    runs-on: ubuntu-latest
    steps:
      - name: Check out controlled release branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Detect verified source chunks
        id: chunks
        shell: bash
        run: |
          if compgen -G ".release_source/part-*" > /dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify, expand, validate and commit normal source tree
        if: steps.chunks.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          expected=16
          count=$(find .release_source -maxdepth 1 -type f -name 'part-*' | wc -l)
          test "$count" -eq "$expected"

          cat .release_source/part-* | base64 --decode > /tmp/TsaoSciComputation-source.tar.zst
          echo "2a479e4c1e53e00f0f7a793761b9dce7e63c119ed69b54282b94da1707031ef9  /tmp/TsaoSciComputation-source.tar.zst" | sha256sum --check --strict

          mkdir -p /tmp/unpacked
          zstd --decompress --stdout /tmp/TsaoSciComputation-source.tar.zst | tar -xf - -C /tmp/unpacked
          test -f /tmp/unpacked/TsaoSciComputation/SKILL.md
          test -f /tmp/unpacked/TsaoSciComputation/ACCEPTANCE_REPORT.md

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/unpacked/TsaoSciComputation/. .

          python -m pip install --upgrade pip
          python -m pip install -e '.[validation]'
          python scripts/run_tests.py --verbose
          python scripts/build_capability_index.py --check
          python scripts/run_example_preflights.py
          python scripts/build_manifest.py --check
          python scripts/package_release.py --output dist/TsaoSciComputation-1.0.0
          rm -rf dist

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release TsaoSciComputation v1.0.0"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
