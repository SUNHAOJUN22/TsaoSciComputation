name: Expand verified TsaoSciComputation v1.0.1 source

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: expand-v101-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  expand:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/audit-v1.0.1'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out controlled release branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Detect verified source archive
        id: source
        shell: bash
        run: |
          if [ -f .release_source/TsaoSciComputation-1.0.1.zip ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify, expand, validate and commit normal source tree
        if: steps.source.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          archive=.release_source/TsaoSciComputation-1.0.1.zip
          test -f "$archive"
          echo "c32b6b28429ba80fe1a941332d07f73516ef29aa5195803d787a8a2d2a54d7b4  $archive" | sha256sum --check --strict

          mkdir -p /tmp/unpacked
          unzip -q "$archive" -d /tmp/unpacked
          source_root=/tmp/unpacked/TsaoSciComputation-1.0.1
          test -f "$source_root/SKILL.md"
          test -f "$source_root/AUDIT_REPORT_2026-07-15.md"
          test "$(cat "$source_root/VERSION")" = "1.0.1"

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$source_root"/. .

          python -m pip install -e '.[validation]'
          python scripts/audit_repository.py --json
          python scripts/sync_package_assets.py --check
          python scripts/run_tests.py --verbose
          python scripts/build_capability_index.py --check
          python scripts/run_example_preflights.py
          python scripts/build_manifest.py --check
          python scripts/verify_wheel.py
          SOURCE_DATE_EPOCH=1700000000 python scripts/package_release.py --output dist/TsaoSciComputation-1.0.1
          rm -rf dist

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Audit and release TsaoSciComputation v1.0.1"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
