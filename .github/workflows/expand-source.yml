name: Expand verified TsaoSciComputation v1.0.2 source

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: expand-v102-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  expand:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/audit-v1.0.2'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out controlled release branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Detect verified patch chunks
        id: source
        shell: bash
        run: |
          if compgen -G ".audit_patch_v102/part-*" > /dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reconstruct baseline, apply patch, validate and commit
        if: steps.source.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail

          baseline_expected=19
          baseline_count=$(find .audit_source_v101 -maxdepth 1 -type f -name 'part-*' | wc -l)
          test "$baseline_count" -eq "$baseline_expected"
          cat .audit_source_v101/part-* | base64 --decode > /tmp/TsaoSciComputation-1.0.1.tar.zst
          echo "4862f93186404e12b4a04d2a8cbcfbd037141ea503524208f4b2143e4bdaf73a  /tmp/TsaoSciComputation-1.0.1.tar.zst" | sha256sum --check --strict

          mkdir -p /tmp/unpacked
          zstd --decompress --stdout /tmp/TsaoSciComputation-1.0.1.tar.zst | tar -xf - -C /tmp/unpacked
          source_root=/tmp/unpacked/TsaoSciComputation
          test -f "$source_root/SKILL.md"
          test "$(cat "$source_root/VERSION")" = "1.0.1"

          patch_expected=8
          patch_count=$(find .audit_patch_v102 -maxdepth 1 -type f -name 'part-*' | wc -l)
          test "$patch_count" -eq "$patch_expected"
          cat .audit_patch_v102/part-* | base64 --decode > /tmp/v102-patch.tar.zst
          echo "7db7cc18b55077a605009d9b16a65d21c19e37e539eb6c567577eb4fdebac63a  /tmp/v102-patch.tar.zst" | sha256sum --check --strict

          mkdir -p /tmp/patch
          zstd --decompress --stdout /tmp/v102-patch.tar.zst | tar -xf - -C /tmp/patch
          cp -a /tmp/patch/v102-patch/files/. "$source_root"/
          python - <<'PY'
          import json
          import shutil
          from pathlib import Path

          root = Path('/tmp/unpacked/TsaoSciComputation').resolve()
          deleted = json.loads(Path('/tmp/patch/v102-patch/deleted.json').read_text(encoding='utf-8'))
          for relative in deleted:
              target = (root / relative).resolve(strict=False)
              if target != root and root not in target.parents:
                  raise SystemExit(f'unsafe deletion path: {relative}')
              if target.is_dir():
                  shutil.rmtree(target)
              elif target.exists() or target.is_symlink():
                  target.unlink()
          PY

          test -f "$source_root/AUDIT_REPORT_2026-07-16.md"
          test "$(cat "$source_root/VERSION")" = "1.0.2"

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$source_root"/. .

          python -m pip install -e '.[validation]'
          python -m black --check --line-length 100 tsao_computation scripts tests examples
          python scripts/deep_audit.py --root . --strict-warnings
          python scripts/audit_repository.py --json
          python scripts/sync_package_assets.py --check
          python scripts/run_tests.py --verbose
          python scripts/build_capability_index.py --check
          python scripts/run_example_preflights.py
          python scripts/build_manifest.py --check
          python scripts/verify_wheel.py
          SOURCE_DATE_EPOCH=1700000000 python scripts/package_release.py --output dist/TsaoSciComputation-1.0.2
          echo "91bd4dfa5b1863445908b958460f1340eaf6824f5741b237e7c91b413a3b530e  dist/TsaoSciComputation-1.0.2.zip" | sha256sum --check --strict

          rm -rf build dist .pytest_cache .mypy_cache .ruff_cache
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -maxdepth 1 -type d -name '*.egg-info' -exec rm -rf {} +
          rm -f .coverage

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Audit and release TsaoSciComputation v1.0.2"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
