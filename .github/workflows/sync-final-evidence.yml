name: Sync final evidence on main

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-final-evidence-main
  cancel-in-progress: false

jobs:
  sync:
    if: >-
      github.repository == 'SUNHAOJUN22/TsaoSciComputation' &&
      github.event.issue.user.login == 'SUNHAOJUN22' &&
      github.event.issue.title == 'Sync v3.0.2 final evidence'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
      - name: Synchronize authoritative coverage evidence
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          python - <<'PY'
          import json
          from pathlib import Path

          coverage = json.loads(Path('evidence/coverage.json').read_text(encoding='utf-8'))['totals']
          final = json.loads(Path('reports/FINAL_VERIFICATION.json').read_text(encoding='utf-8'))
          remote_path = Path('reports/REMOTE_FINALIZATION.json')
          remote = json.loads(remote_path.read_text(encoding='utf-8'))
          remote['coverage'] = {
              'covered_branches': coverage['covered_branches'],
              'covered_lines': coverage['covered_lines'],
              'excluded_lines': coverage['excluded_lines'],
              'missing_branches': coverage['missing_branches'],
              'missing_lines': coverage['missing_lines'],
              'num_branches': coverage['num_branches'],
              'num_partial_branches': coverage['num_partial_branches'],
              'num_statements': coverage['num_statements'],
              'percent_branches_covered': coverage['percent_branches_covered'],
              'percent_branches_covered_display': coverage['percent_branches_covered_display'],
              'percent_covered': coverage['percent_covered'],
              'percent_covered_display': coverage['percent_covered_display'],
              'percent_statements_covered': final['statement_coverage_percent'],
              'percent_statements_covered_display': str(round(final['statement_coverage_percent'])),
          }
          remote['tests'] = {
              'errors': 0,
              'failures': final['tests_failed'],
              'passed': final['tests_passed'],
          }
          remote['version'] = final['version']
          remote_path.write_text(json.dumps(remote, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
          rm -f .github/workflows/sync-final-evidence.yml
          python scripts/build_manifest.py
          python scripts/build_manifest.py --check
          python scripts/validate_repository.py
          git add reports/REMOTE_FINALIZATION.json manifest.json
          git diff --cached --quiet && { echo 'Evidence already synchronized'; exit 0; }
          git commit -m 'Synchronize v3.0.2 final evidence'
          git push origin HEAD:refs/heads/main
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body 'Final coverage and test evidence were synchronized from evidence/coverage.json and reports/FINAL_VERIFICATION.json; Manifest was rebuilt for the final two-workflow repository state.'
