name: Hash-bound release source repair

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/audit-v1.0.2'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out trusted release archive
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Repair three truncated Base64 chunks against release digest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/repair recovered
          python - <<'PY'
          import base64
          import hashlib
          import json
          from pathlib import Path

          alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/'
          expected = '2a479e4c1e53e00f0f7a793761b9dce7e63c119ed69b54282b94da1707031ef9'
          paths = sorted(Path('.release_source').glob('part-*'))
          if len(paths) != 16:
              raise SystemExit(f'expected 16 release parts, found {len(paths)}')
          texts = {path.name: ''.join(path.read_text(encoding='ascii').split()) for path in paths}
          valid_chars = set(alphabet + '=')
          for name, text in texts.items():
              invalid = set(text) - valid_chars
              if invalid:
                  raise SystemExit(f'{name} contains invalid Base64 characters: {sorted(invalid)}')

          if len(texts['part-002']) != 11999 or len(texts['part-002']) % 4 != 3 or '=' in texts['part-002']:
              raise SystemExit('part-002 no longer matches the measured one-character truncation signature')
          for name in ('part-013', 'part-014'):
              text = texts[name]
              if len(text) % 4 != 3 or not text.endswith('=='):
                  raise SystemExit(f'{name} no longer matches the measured one-character truncation signature')

          damaged = {'part-002', 'part-013', 'part-014'}

          def decode_complete(name: str, text: str) -> bytes:
              if name in damaged:
                  raise AssertionError('damaged part requires a candidate character')
              remainder = len(text) % 4
              if remainder == 1:
                  raise SystemExit(f'{name} has invalid Base64 length modulo 4 = 1')
              padded = text + ('=' * ((4 - remainder) % 4))
              return base64.b64decode(padded, validate=True)

          fixed = {name: decode_complete(name, text) for name, text in texts.items() if name not in damaged}
          candidates = {
              'part-002': {
                  char: base64.b64decode(texts['part-002'] + char, validate=True)
                  for char in alphabet
              },
              'part-013': {
                  char: base64.b64decode(texts['part-013'][:-2] + char + '==', validate=True)
                  for char in alphabet
              },
              'part-014': {
                  char: base64.b64decode(texts['part-014'][:-2] + char + '==', validate=True)
                  for char in alphabet
              },
          }

          prefix = hashlib.sha256()
          prefix.update(fixed['part-000'])
          prefix.update(fixed['part-001'])
          middle = b''.join(fixed[f'part-{index:03d}'] for index in range(3, 13))
          suffix = fixed['part-015']

          solutions = []
          for char_002 in alphabet:
              after_002 = prefix.copy()
              after_002.update(candidates['part-002'][char_002])
              after_002.update(middle)
              for char_013 in alphabet:
                  after_013 = after_002.copy()
                  after_013.update(candidates['part-013'][char_013])
                  for char_014 in alphabet:
                      final = after_013.copy()
                      final.update(candidates['part-014'][char_014])
                      final.update(suffix)
                      if final.hexdigest() == expected:
                          solutions.append((char_002, char_013, char_014))

          if not solutions:
              raise SystemExit('no three-character repair matches the published release SHA-256')
          if len(solutions) != 1:
              raise SystemExit(f'digest repair is not unique: {solutions!r}')

          char_002, char_013, char_014 = solutions[0]
          ordered_names = [path.name for path in paths]
          chunks = []
          for name in ordered_names:
              if name == 'part-002':
                  chunks.append(candidates[name][char_002])
              elif name == 'part-013':
                  chunks.append(candidates[name][char_013])
              elif name == 'part-014':
                  chunks.append(candidates[name][char_014])
              else:
                  chunks.append(fixed[name])
          archive = b''.join(chunks)
          actual = hashlib.sha256(archive).hexdigest()
          if actual != expected:
              raise SystemExit('internal repair verification failed')

          output = Path('/tmp/repair/TsaoSciComputation-v1.0.0.tar.zst')
          output.write_bytes(archive)
          evidence = {
              'expected_sha256': expected,
              'actual_sha256': actual,
              'repair_is_unique': True,
              'repair_space_checked': 64 ** 3,
              'part-002_missing_base64_character': char_002,
              'part-013_missing_base64_character': char_013,
              'part-014_missing_base64_character': char_014,
              'repair_positions': {
                  'part-002': 'appended at truncated chunk boundary',
                  'part-013': 'inserted immediately before trailing ==',
                  'part-014': 'inserted immediately before trailing ==',
              },
              'unchanged_parts': [name for name in ordered_names if name not in damaged],
              'claim_boundary': 'byte-exact archive recovery by published digest; no scientific solver execution',
          }
          Path('/tmp/repair/BASE64_REPAIR_EVIDENCE.json').write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          print(json.dumps(evidence, sort_keys=True))
          PY
          echo '2a479e4c1e53e00f0f7a793761b9dce7e63c119ed69b54282b94da1707031ef9  /tmp/repair/TsaoSciComputation-v1.0.0.tar.zst' | sha256sum --check --strict
          zstd --test /tmp/repair/TsaoSciComputation-v1.0.0.tar.zst
          zstd --decompress --stdout /tmp/repair/TsaoSciComputation-v1.0.0.tar.zst > /tmp/repair/source.tar

      - name: Safely inspect and extract repaired source archive
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import tarfile
          from pathlib import Path, PurePosixPath

          archive = Path('/tmp/repair/source.tar')
          output = Path('/tmp/repair/unpacked')
          output.mkdir(parents=True, exist_ok=True)
          max_files = 10000
          max_member = 100 * 1024 * 1024
          max_total = 1024 * 1024 * 1024
          with tarfile.open(archive, 'r:') as tf:
              members = tf.getmembers()
              if len(members) > max_files:
                  raise SystemExit('archive file-count limit exceeded')
              total = 0
              for member in members:
                  name = PurePosixPath(member.name)
                  if not member.name or name.is_absolute() or '..' in name.parts:
                      raise SystemExit(f'unsafe archive path: {member.name!r}')
                  if member.isdev() or member.isfifo():
                      raise SystemExit(f'unsafe special file: {member.name!r}')
                  if member.size < 0 or member.size > max_member:
                      raise SystemExit(f'unsafe member size: {member.name!r}')
                  total += member.size
                  if total > max_total:
                      raise SystemExit('archive expanded-size limit exceeded')
                  if member.issym() or member.islnk():
                      link = PurePosixPath(member.linkname)
                      target = name.parent / link
                      if link.is_absolute() or '..' in target.parts:
                          raise SystemExit(f'unsafe archive link: {member.name!r} -> {member.linkname!r}')
              tf.extractall(output, members=members, filter='data')

          roots = [path for path in output.iterdir() if path.is_dir()]
          if len(roots) != 1:
              raise SystemExit(f'unexpected archive root count: {len(roots)}')
          root = roots[0]
          required = ['SKILL.md', 'README.md', 'README.zh-CN.md', 'VERSION', 'LICENSE', 'THIRD_PARTY.md', 'pyproject.toml']
          missing = [name for name in required if not (root / name).is_file()]
          if missing:
              raise SystemExit(f'missing required source files: {missing}')
          version = (root / 'VERSION').read_text(encoding='utf-8').strip()
          if version != '1.0.0':
              raise SystemExit(f'unexpected source version: {version!r}')

          repair = json.loads(Path('/tmp/repair/BASE64_REPAIR_EVIDENCE.json').read_text(encoding='utf-8'))
          repair.update({'archive_members': len(members), 'expanded_bytes': total, 'source_root': root.name})
          (root / 'SOURCE_RECOVERY_MANIFEST.json').write_text(
              json.dumps(repair, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          Path('/tmp/repair/root.txt').write_text(str(root), encoding='utf-8')
          PY
          root=$(cat /tmp/repair/root.txt)
          python -m compileall -q "$root"
          cp -a "$root" recovered/TsaoSciComputation
          cp /tmp/repair/BASE64_REPAIR_EVIDENCE.json recovered/
          find recovered/TsaoSciComputation -type f -print0 | sort -z | xargs -0 sha256sum > recovered/SHA256SUMS

      - name: Upload byte-exact recovered source
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: TsaoSciComputation-v1.0.0-byte-exact-recovered-source
          path: recovered
          if-no-files-found: error
          retention-days: 7
