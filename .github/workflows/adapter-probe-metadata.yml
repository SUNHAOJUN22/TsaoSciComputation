name: Adapter probe metadata migration

on:
  push:
    branches: [main]
    paths: [.adapter-probe-metadata-trigger]

permissions:
  contents: write

concurrency:
  group: adapter-probe-metadata-migration
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
      - name: Add fail-closed module probe declarations
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          python - <<'PY'
          import json
          from pathlib import Path

          modules = {
              'pyscf': ['pyscf'],
              'ase-pymatgen': ['ase', 'pymatgen'],
              'openmm': ['openmm'],
              'mace': ['mace'],
              'dolfinx': ['dolfinx'],
              'kratos': ['KratosMultiphysics'],
              'idaes-pyomo': ['idaes', 'pyomo'],
              'cantera-rmg': ['cantera', 'rmgpy'],
          }
          source = Path('registry/adapters.json')
          records = json.loads(source.read_text(encoding='utf-8'))
          for record in records:
              slug = record['slug']
              declared = modules.get(slug)
              if declared:
                  record['python_modules'] = declared
                  record['runnable_when'] = (
                      'All declared Python modules and at least one declared executable are detected, '
                      'and all required inputs, licenses, data, and environment checks pass.'
                  )
              else:
                  record.pop('python_modules', None)
          source.write_text(json.dumps(records, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          for record in records:
              target = Path('adapters') / record['slug'] / 'adapter.yaml'
              target.write_text(json.dumps(record, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
          python scripts/sync_package_assets.py
          python scripts/build_adapter_docs.py
          python scripts/build_manifest.py
          git add registry/adapters.json tsao_computation/data/registry/adapters.json adapters manifest.json
          if ! git diff --cached --quiet; then
            git commit -m 'Declare fail-closed Python module adapter probes'
            git push origin HEAD:refs/heads/main
          fi
