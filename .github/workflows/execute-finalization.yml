name: Execute verified single-main finalization
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
permissions:
  actions: write
  contents: write
  pull-requests: write
concurrency:
  group: execute-final-single-main-${{ github.event.pull_request.number }}
  cancel-in-progress: false
jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/final-main-v3'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          fetch-tags: true
      - name: Verify loader and extract source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/tsao-payload /tmp/tsao-extracted
          mkdir -p /tmp/tsao-payload /tmp/tsao-extracted
          cp .final_source/* /tmp/tsao-payload/
          cd /tmp/tsao-payload
          printf '%s  %s\n' \
            4012741a7892548de9f844597025c98b035bf60f57c4ff07f0023b190d57bfe5 loader-000 \
            7cca82c3e6c480ce874f86a8f9a73aca3806e63f19e16b2162a7836c91ae2771 loader-001 \
            3f5792a493cd5a9513cbe2bc5a95e91392dddc2b4395eaa3d653fe821404cf1e loader-002 | sha256sum -c --strict
          cat loader-* > loader.py
          echo 'e3ce2c938cf43743554fb1762accab7e83cd825061047042d8b15a2c69570fe6  loader.py' | sha256sum -c --strict
          python loader.py
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
      - name: Install validation toolchain
        run: python -m pip install -e '/tmp/tsao-extracted/TsaoSciComputation-3.0.0[validation,quality]'
      - name: Validate, promote, and govern
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
          API_URL: ${{ github.api_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python /tmp/tsao-payload/finalizer.py --workspace "$GITHUB_WORKSPACE" \
            --source-root /tmp/tsao-extracted/TsaoSciComputation-3.0.0 \
            --repository "$REPOSITORY" --api-url "$API_URL" --token "$GH_TOKEN" \
            --base-sha "$BASE_SHA" --head-sha "$HEAD_SHA" --run-id "$RUN_ID"
      - name: Upload final evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: TsaoSciComputation-v3.0.0-single-main-evidence
          path: /tmp/finalization-artifacts
          if-no-files-found: warn
          retention-days: 30
