name: Audit v3.0.1 release r2

on:
  push:
    branches: [main]
    paths: [.audit-v301-release-r2]

permissions:
  contents: write
  attestations: read

concurrency:
  group: audit-v301-release
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'
          cache: pip

      - name: Audit published release and attestations
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          STAGE=initialization
          exec > >(tee /tmp/v301-release-audit-r2.log) 2>&1
          record_failure() {
            code=$?
            set +e
            export STAGE code
            python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          log = Path('/tmp/v301-release-audit-r2.log')
          tail = '\n'.join(log.read_text(encoding='utf-8', errors='replace').splitlines()[-240:]) if log.exists() else ''
          report = {
              'schema_version': '1.0',
              'status': 'FAILED',
              'stage': os.environ['STAGE'],
              'exit_code': int(os.environ['code']),
              'branch': 'main',
              'temporary_branch_created': False,
              'failed_at_utc': datetime.now(timezone.utc).isoformat(),
              'log_tail': tail,
          }
          path = Path('reports/RELEASE_AUDIT.json')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
            git add reports/RELEASE_AUDIT.json
            git commit -m "Record corrected v3.0.1 release audit failure at ${STAGE}" || true
            git push origin HEAD:refs/heads/main || true
            exit "$code"
          }
          trap record_failure ERR

          STAGE=dependencies
          python -m pip install -e '.[validation,quality]'

          VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"
          TAG="v${VERSION_VALUE}"
          test "$TAG" = v3.0.1

          STAGE=single-main-policy
          mapfile -t branches < <(gh api --paginate "repos/$GITHUB_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u)
          test "${#branches[@]}" -eq 1
          test "${branches[0]}" = main

          STAGE=release-metadata
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
            --json tagName,name,isDraft,isPrerelease,publishedAt,url,targetCommitish,assets \
            > /tmp/v301-release.json
          git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
          TAG_COMMIT="$(git rev-list -n 1 "$TAG")"
          export VERSION_VALUE TAG TAG_COMMIT
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          release = json.loads(Path('/tmp/v301-release.json').read_text(encoding='utf-8'))
          version = os.environ['VERSION_VALUE']
          expected = {
              f'TsaoSciComputation-{version}.zip',
              f'TsaoSciComputation-{version}.tar.gz',
              f'tsao_scicomputation-{version}-py3-none-any.whl',
              f'TsaoSciComputation-{version}.spdx.json',
              f'TsaoSciComputation-{version}.cdx.json',
              f'TsaoSciComputation-{version}.provenance.sigstore.json',
              f'TsaoSciComputation-{version}.sbom.sigstore.json',
              'SHA256SUMS',
              'RELEASE_MANIFEST.json',
              'FINAL_VERIFICATION.json',
              'SOURCE_BUILD_REPORT.json',
              'WHEEL_VERIFICATION.json',
          }
          assets = {item['name'] for item in release['assets']}
          missing = sorted(expected - assets)
          if release['tagName'] != os.environ['TAG']:
              raise SystemExit('release tag mismatch')
          if release['isDraft'] or release['isPrerelease']:
              raise SystemExit('release is not final')
          if missing:
              raise SystemExit(f'missing release assets: {missing}')
          PY

          STAGE=download-release
          rm -rf /tmp/TsaoSciComputation-v301-release
          mkdir -p /tmp/TsaoSciComputation-v301-release
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --dir /tmp/TsaoSciComputation-v301-release

          STAGE=checksums-and-manifest
          (cd /tmp/TsaoSciComputation-v301-release && sha256sum -c SHA256SUMS)
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path('/tmp/TsaoSciComputation-v301-release')
          manifest = json.loads((root / 'RELEASE_MANIFEST.json').read_text(encoding='utf-8'))
          if manifest['version'] != os.environ['VERSION_VALUE']:
              raise SystemExit('release Manifest version mismatch')
          if manifest['source_commit'] != os.environ['TAG_COMMIT']:
              raise SystemExit('release Manifest source commit differs from tag commit')
          for item in manifest['artifacts']:
              path = root / item['name']
              if not path.is_file():
                  raise SystemExit(f'Manifest artifact missing: {item["name"]}')
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              if digest != item['sha256'] or path.stat().st_size != item['bytes']:
                  raise SystemExit(f'Manifest mismatch: {item["name"]}')
          PY

          STAGE=attestation-verification
          gh attestation verify "/tmp/TsaoSciComputation-v301-release/TsaoSciComputation-${VERSION_VALUE}.zip" --repo "$GITHUB_REPOSITORY"
          gh attestation verify "/tmp/TsaoSciComputation-v301-release/TsaoSciComputation-${VERSION_VALUE}.tar.gz" --repo "$GITHUB_REPOSITORY"
          gh attestation verify "/tmp/TsaoSciComputation-v301-release/tsao_scicomputation-${VERSION_VALUE}-py3-none-any.whl" --repo "$GITHUB_REPOSITORY"

          STAGE=platform-setting
          PVR_ENABLED="$(gh api "repos/$GITHUB_REPOSITORY/private-vulnerability-reporting" --jq '.enabled')"
          export PVR_ENABLED

          STAGE=write-audit-evidence
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          release = json.loads(Path('/tmp/v301-release.json').read_text(encoding='utf-8'))
          report = {
              'schema_version': '1.0',
              'status': 'VERIFIED',
              'verified_at_utc': datetime.now(timezone.utc).isoformat(),
              'repository': 'SUNHAOJUN22/TsaoSciComputation',
              'branch': 'main',
              'remote_branches': ['main'],
              'temporary_branch_created': False,
              'version': os.environ['VERSION_VALUE'],
              'tag': os.environ['TAG'],
              'tag_commit': os.environ['TAG_COMMIT'],
              'release_url': release['url'],
              'release_name': release['name'],
              'published_at': release['publishedAt'],
              'asset_count': len(release['assets']),
              'release_is_draft': release['isDraft'],
              'release_is_prerelease': release['isPrerelease'],
              'sha256_checksums_verified': True,
              'release_manifest_verified': True,
              'zip_attestation_verified': True,
              'tar_gz_attestation_verified': True,
              'wheel_attestation_verified': True,
              'private_vulnerability_reporting_enabled': os.environ['PVR_ENABLED'] == 'true',
              'remaining_admin_actions': [] if os.environ['PVR_ENABLED'] == 'true' else [
                  'enable_private_vulnerability_reporting_in_repository_settings'
              ],
          }
          Path('reports/RELEASE_AUDIT.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY

          STAGE=clean-and-validate-main
          rm -f .github/workflows/audit-v301-release.yml .github/workflows/audit-v301-release-r2.yml
          rm -f .audit-v301-release .audit-v301-release-r2
          python scripts/build_manifest.py
          python scripts/verify_all.py --profile core
          git add -A
          git commit -m 'Audit v3.0.1 release assets and attestations'
          git push origin HEAD:refs/heads/main
          trap - ERR
