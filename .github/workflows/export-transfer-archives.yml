name: Export trusted transfer archives

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  export:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/tsao-source-forensics'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      workflow_artifact_id: ${{ steps.locate.outputs.workflow_artifact_id }}
      exported_directories: ${{ steps.inventory.outputs.exported_directories }}
    steps:
      - name: Check out trusted base archive bytes
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Build byte inventory
        id: inventory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p transfer-archives
          exported=()
          for directory in .release_source .audit_source_v101 .audit_patch_v102; do
            if [ -d "$directory" ]; then
              cp -a "$directory" transfer-archives/
              exported+=("$directory")
            fi
          done
          test "${#exported[@]}" -gt 0
          printf 'exported_directories=%s\n' "$(IFS=,; echo "${exported[*]}")" >> "$GITHUB_OUTPUT"
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('transfer-archives')
          records = []
          for path in sorted(root.rglob('*')):
              if path.is_file():
                  records.append({'path': str(path.relative_to(root)), 'size_bytes': path.stat().st_size})
          Path('/tmp/FILE_INVENTORY.json').write_text(json.dumps(records, indent=2, sort_keys=True) + '\n')
          PY
          find transfer-archives -type f -print0 | sort -z | xargs -0 sha256sum > /tmp/FILE_SHA256SUMS
          mv /tmp/FILE_INVENTORY.json transfer-archives/FILE_INVENTORY.json
          mv /tmp/FILE_SHA256SUMS transfer-archives/FILE_SHA256SUMS

      - name: Upload raw transfer archives including dot directories
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: TsaoSciComputation-raw-transfer-archives
          path: transfer-archives
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

      - name: Locate raw archive artifact ID
        id: locate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            curl --fail --silent --show-error --location \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts?per_page=100" \
              > /tmp/artifacts.json
            artifact_id=$(python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('/tmp/artifacts.json').read_text(encoding='utf-8'))
          matches = [item for item in data.get('artifacts', []) if item.get('name') == 'TsaoSciComputation-raw-transfer-archives']
          print(matches[0]['id'] if matches else '')
          PY
            )
            if [ -n "$artifact_id" ]; then
              echo "workflow_artifact_id=$artifact_id" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 2
          done
          echo 'workflow_artifact_id=' >> "$GITHUB_OUTPUT"

  report:
    needs: export
    if: always()
    name: raw-transfer-${{ needs.export.outputs.exported_directories }}-artifact-${{ needs.export.outputs.workflow_artifact_id }}
    runs-on: ubuntu-latest
    steps:
      - run: echo 'Raw transfer artifact ID encoded in job name.'
